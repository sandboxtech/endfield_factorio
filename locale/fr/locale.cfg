admin-gen-tip=[font=default-bold]Débogage de génération[/font]\nRésumé des propriétés de la dernière génération de monde pour chaque planète
admin-diff-tip=[font=default-bold]Comparaison des paramètres[/font]\nComplète d'abord les valeurs par défaut et nettoie les clés obsolètes, puis liste les paramètres modifiés via /c

