
description=\n[color=acid]Factorio [font=infinite]Saut Infini[/font][/color]\n\n[space-age] [font=default-large-bold]Histoire[/font]\nNotre patrie commune, Tavis II, est détruite.\nQuand le [color=acid]compte à rebours[/color] se termine, nous devons [color=yellow]sauter[/color] vers un nouveau système pour fuir.\n\n[img=virtual-signal/signal-clock] [font=default-large-bold]Compte à rebours[/font]\nQuand le [color=acid]compte à rebours[/color] en haut se termine, vous [color=yellow]sautez[/color] vers un nouveau monde, seulement __1__ minutes au début.\nRecherchez les [color=yellow]technologies à fioles[/color] et le [color=acid]compte à rebours[/color] s'allonge.\n\n[img=space-location/solar-system-edge] [font=default-large-bold]Saut[/font]\nChaque [color=yellow]saut[/color] [color=red]abandonne[/color] tout l'ancien système.\nVos usines, technologies, minerais et matériaux restent tous derrière.\nSeuls l'[color=acid]expérience[/color] et votre [color=acid]vaisseau[/color] vous accompagnent dans le nouveau système\n\n[img=virtual-signal/signal-science-pack] [font=default-large-bold]Expérience[/font]\nÀ l'instant où vous [color=yellow]sautez[/color], les [color=acid]fioles[/color] dans votre sac se transforment en [color=acid]expérience[/color].\nIl existe 12 sortes d'[color=acid]expérience[/color], à vous seul, jamais perdues.\nChaque [color=acid]fiole[/color] ordinaire devient 1 point d'[color=acid]expérience[/color].\nPlus la qualité des [color=acid]fioles[/color] est élevée, plus elles donnent d'[color=acid]expérience[/color].\nPlus vous accumulez d'[color=acid]expérience[/color], plus votre [color=acid]niveau[/color] est élevé, et plus vous recevez de ressources de départ de votre [color=acid]classe[/color].\n\n[img=virtual-signal/signal-mining][font=default-large-bold]Classe[/font]\nCliquez sur le bouton en haut pour choisir une [color=acid]classe[/color], elle détermine vos [color=acid]objets de départ de classe[/color].\nAu début, vous recevez gratuitement des [color=acid]objets de départ inconditionnels[/color].\nAvant le saut, emportez davantage de [color=acid]fioles[/color] qu'elle utilise et montez le [color=acid]niveau[/color] correspondant, pour recevoir plus d'[color=acid]objets de départ supplémentaires[/color] au début.\n\n[img=virtual-signal/signal-heart] [font=default-large-bold]Vaisseau[/font]\nLe vaisseau vous suit à travers les systèmes, le préfixe de son nom indique combien de sauts il peut encore faire avec vous.\n__2__ au début ; une fois les [color=yellow]sauts[/color] [space-age] épuisés, le vaisseau est mis au rebut\n\n\nVersion 20260604\n[img=entity/big-wriggler-pentapod] Groupe QQ de signalement de BUG 293280221\nAdresse du projet\nhttps://github.com/sandboxtech/endfield_factorio
scenario-name=[color=acid]Factorio [font=infinite]Saut Infini[/font][/color]
[wn]

# ══ Base / système ══
