# ══ Système de classes ══
# Titre de la fenêtre des classes (ouverte par un bouton HUD indépendant)
class-title=[img=virtual-signal/signal-mining] Choisir une classe
# Explication en haut de la fenêtre des classes (ne parler que des classes, pas des autres systèmes)
class-help=Choisissez une [color=acid]classe[/color], elle détermine vos [color=acid]objets de départ de classe[/color]\nau début vous recevez gratuitement des [color=acid]objets de départ inconditionnels[/color]\navant le saut emportez davantage de [color=acid]fioles[/color] qu'elle utilise, plus ces fioles sont montées en niveau, plus vous recevez d'[color=acid]objets de départ supplémentaires[/color]\nUne seule classe à la fois ; changez quand vous voulez, effectif au [color=yellow]prochain saut[/color] : [img=virtual-signal/signal-mining] vert = classe actuelle ; [img=virtual-signal/signal-check] bleu = réservée pour le prochain saut ; [img=virtual-signal/signal-deny] rouge = bientôt remplacée
# Boutons de classe dans la fenêtre des classes : __1__ = nom de la classe (class-name-*), __2__ = icône de l'objet emblématique de cette classe
class-pick=__2__ __1__
# Indication après sélection (seulement pour soi-même) : __1__ = nom de la classe
# Annonce serveur du changement de classe : __1__ nom du joueur, __2__ nom de la classe
class-changed=[color=acid]__1__[/color] veut passer à la classe [color=acid]__2__[/color]
travel-fail-closed=Impossible de se rendre sur __1__ ce tour (probabilité d'ouverture __2__ %)
travel-no-char=Vous n'avez pas de personnage actuellement, impossible de vous rendre sur une planète
travel-not-generated=La planète __1__ n'est pas encore générée
travel-clear-first=Avant de vous rendre sur une planète, videz d'abord ces quatre zones : curseur, sac, logistique (recyclage), munitions
roboport-limit=[color=red][Réseau de robots][/color] Un seul réseau de robots a dépassé la limite de __1__ roboports, le nouveau placé a été détruit et remboursé.
# Explication au survol (assemblée, chaque ligne avec \n) : ligne offerte class-tip-head (__1__ nombre total, __2__ icône de l'objet) ; ligne de récompense class-tip-reward
#   (__1__ icône de fiole=source du niveau, __2__ tous les combien de niveaux, __3__ combien par lot, __4__ icône de l'objet, __5__ combien au maximum à plein niveau ; __2__:__3__ = ligne de plein niveau:total à plein niveau, ratio le plus simple)
class-tip-head=\nOffert [color=acid]__1__[/color] __2__
class-tip-reward=\n__1__ tous les [color=acid]__2__[/color] niv donne [color=acid]__3__[/color] __4__ [color=acid]__5__/__6__[/color]
class-tip-tech=\n[color=acid]Débloqué au début[/color]
class-tip-tech-chance= [color=yellow](__1__ % de chances)[/color]
class-tip-item-p= [color=yellow](__1__ % par unité)[/color]
# 概率科技/配方掷点结果（发给该职业在线玩家）：__1__ 图标，__2__ 本地化名
class-roll-hit=[img=virtual-signal/signal-check] Débloqué ce monde : __1__ [color=acid]__2__[/color]
class-roll-hit-levels=[img=virtual-signal/signal-check] Débloqué ce monde : __1__ [color=acid]__2__[/color] (+__3__ niveaux)
class-roll-miss=[img=virtual-signal/signal-deny] Non débloqué ce monde : __1__ [color=red]__2__[/color] (relancé au prochain saut)
class-tip-recipe=\n[color=acid]Recettes de départ :[/color]
# Ligne des conditions de déblocage (toutes requises) : __1__ icône de la fiole requise, __2__ niveau requis, __3__ niveau actuel
class-tip-unlock=\n[color=red]Déblocage requis[/color] __1__ [color=acid]__2__[/color] niv actuel __3__
# Indication en cliquant sur une classe non débloquée : __1__ = nom de la classe
class-locked-msg=[color=red]__1__[/color] pas encore débloquée, niveau de fioles insuffisant
# Sous-titres des sections de la fenêtre des classes (utilisés par gui.show_classes ; en environnement anglais on passe ici, si le chinois manque on retombe sur def.section chinois)
class-section-basic=Production de base
