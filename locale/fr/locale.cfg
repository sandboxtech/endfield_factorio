
description=\n[color=acid]Factorio [font=infinite]Saut Infini[/font][/color]\n\n[space-age] [font=default-large-bold]Histoire[/font]\nNotre patrie commune, Tavis II, est détruite.\nQuand le [color=acid]compte à rebours[/color] se termine, nous devons [color=yellow]sauter[/color] vers un nouveau système pour fuir.\n\n[img=virtual-signal/signal-clock] [font=default-large-bold]Compte à rebours[/font]\nQuand le [color=acid]compte à rebours[/color] en haut se termine, vous [color=yellow]sautez[/color] vers un nouveau monde, seulement __1__ minutes au début.\nRecherchez les [color=yellow]technologies à fioles[/color] et le [color=acid]compte à rebours[/color] s'allonge.\n\n[img=space-location/solar-system-edge] [font=default-large-bold]Saut[/font]\nChaque [color=yellow]saut[/color] [color=red]abandonne[/color] tout l'ancien système.\nVos usines, technologies, minerais et matériaux restent tous derrière.\nSeuls l'[color=acid]expérience[/color] et votre [color=acid]vaisseau[/color] vous accompagnent dans le nouveau système\n\n[img=virtual-signal/signal-science-pack] [font=default-large-bold]Expérience[/font]\nÀ l'instant où vous [color=yellow]sautez[/color], les [color=acid]fioles[/color] dans votre sac se transforment en [color=acid]expérience[/color].\nIl existe 12 sortes d'[color=acid]expérience[/color], à vous seul, jamais perdues.\nChaque [color=acid]fiole[/color] ordinaire devient 1 point d'[color=acid]expérience[/color].\nPlus la qualité des [color=acid]fioles[/color] est élevée, plus elles donnent d'[color=acid]expérience[/color].\nPlus vous accumulez d'[color=acid]expérience[/color], plus votre [color=acid]niveau[/color] est élevé, et plus vous recevez de ressources de départ de votre [color=acid]classe[/color].\n\n[img=virtual-signal/signal-mining][font=default-large-bold]Classe[/font]\nCliquez sur le bouton en haut pour choisir une [color=acid]classe[/color], elle détermine vos [color=acid]objets de départ de classe[/color].\nAu début, vous recevez gratuitement des [color=acid]objets de départ inconditionnels[/color].\nAvant le saut, emportez davantage de [color=acid]fioles[/color] qu'elle utilise et montez le [color=acid]niveau[/color] correspondant, pour recevoir plus d'[color=acid]objets de départ supplémentaires[/color] au début.\n\n[img=virtual-signal/signal-heart] [font=default-large-bold]Vaisseau[/font]\nLe vaisseau vous suit à travers les systèmes, le préfixe de son nom indique combien de sauts il peut encore faire avec vous.\n__2__ au début, [color=yellow][space-age]quand le nombre de sauts est épuisé, le vaisseau est mis au rebut[/color]\n\n\nVersion 2026060119\n[img=entity/big-wriggler-pentapod] Groupe QQ de signalement de BUG 293280221\nAdresse du projet\nhttps://github.com/sandboxtech/endfield_factorio
scenario-name=[color=acid]Factorio [font=infinite]Saut Infini[/font][/color]
[wn]

# ══ Base / système ══
permission-denied=Permissions insuffisantes
# Annonce de commande : tout joueur utilisant toute commande personnalisée l'annonce à tous les joueurs en ligne (__1__ joueur, __2__ /commande paramètres)
cmd-used=[color=yellow]__1__[/color] a utilisé [color=acid]__2__[/color]

# ══ Saut · compte à rebours · vote · cérémonie ══
# Saut
warp-success-time=Saut réussi ! Durée [color=acid]__1__ h __2__ min[/color]
warp-extend-tech=Recherche de [img=item/__1__] saut compte à rebours +__2__ min\nTotal de ce tour __3__ h __4__ min, restant [color=acid]__5__ h __6__ min[/color]
warp-warning=[img=virtual-signal/signal-alert]Saut dans __1__, pensez à mettre vos fioles dans le sac
# Étiquette fusionnée en haut : tour du monde + compte à rebours du saut (__1__ tour, __2__ heures, __3__ minutes). Les anciennes clés run / warp-countdown sont fusionnées ici.
world-status=[img=space-location/solar-system-edge] Monde __1__ [space-age] Saut dans __2__ h __3__ min
# Effet de cérémonie du saut : grand texte au centre de l'écran à l'instant du zéro
warp-fx-go=SAUT !
duration-minutes=__1__ min
duration-hours=__1__ h
suicide-notice=Le joueur [color=yellow]__1__[/color] s'est suicidé et est retourné à sa planète de naissance. Restant ce tour __2__ h __3__ min.
# Pénalité de lancement de fusée : __1__ charge, __2__ minutes de pénalité, __3__ heures restantes, __4__ minutes restantes
rocket-penalty=[img=item/rocket-part] Fusée lancée ! Saut compte à rebours [color=red]-__2__ min[/color]\nRestant [color=acid]__3__ h __4__ min[/color]\nCharge __1__
# Qui a voté : __1__ = nom du joueur
warp-vote-cast-agree=[img=space-location/solar-system-edge] [color=yellow]__1__[/color] a voté [color=acid]saut[/color]
warp-vote-cast-oppose=[img=space-location/solar-system-edge] [color=yellow]__1__[/color] a voté [color=acid]rester[/color]
# État du vote de saut : __1__ pour, __2__ contre, __3__ net pour, __4__ seuil (=ceil(joueurs en ligne/warp_vote_divisor, défaut 5))
warp-vote-status=[img=space-location/solar-system-edge] Vote de saut pour [color=acid]__1__[/color] contre [color=acid]__2__[/color] net pour [color=acid]__3__[/color] requis [color=acid]__4__[/color]
# Vote de saut adopté : __1__ = minutes restantes auxquelles le compte à rebours est fixé (défaut 5)
warp-vote-pass=[img=space-location/solar-system-edge] Vote de saut adopté ! Le compte à rebours de ce monde est fixé directement à [color=red]__1__ min restantes[/color]
# Vote de saut annulé par changement de vote : __1__ = minutes restantes après réajout du temps réduit
warp-vote-cancel=[img=space-location/solar-system-edge] Vote de saut sous le seuil, avance annulée, compte à rebours rétabli à [color=acid]__1__ min restantes[/color]
# Joueur se rendant sur une planète : __1__ = nom du joueur, __2__ = nom interne de la planète
travel-notice=[color=yellow]__1__[/color] se rend sur [img=space-location/__2__] [color=acid]__2__[/color]
# Cette planète n'est pas ouverte au voyage ce tour (survol quand le bouton est grisé) : __1__ = probabilité d'ouverture de cette planète %
travel-closed=Non ouverte ce tour, probabilité d'ouverture __1__ %
# Planète de naissance définie avec succès : __1__ = nom de la planète
home-set=Planète de naissance définie sur [img=space-location/__1__] [color=acid]__1__[/color]\nAu prochain saut vous réapparaîtrez ici et recevrez l'équipement de départ
# Refroidissement partagé vote + téléportation : __1__ = secondes restantes
action-cd=[img=virtual-signal/signal-clock] Action en recharge, encore [color=acid]__1__ s[/color]
# Indications de refroidissement indépendantes pour chaque action (__1__ = secondes restantes)
cd-travel=[img=virtual-signal/signal-clock] Téléportation en recharge, encore [color=acid]__1__ s[/color]
cd-vote=[img=virtual-signal/signal-clock] Vote en recharge, encore [color=acid]__1__ s[/color]
cd-star=[img=virtual-signal/signal-clock] Transfert en recharge, encore [color=acid]__1__ s[/color]

# ══ Infobulles des boutons HUD en haut ══
