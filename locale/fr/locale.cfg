# ══ Système d'adhésion ══
# Système d'adhésion : /member accorder (admin/membre) · /unmember révoquer (admin uniquement, peut révoquer tout membre) · /kickout expulser un non-membre (membre/admin) ; l'admin est toujours considéré comme membre
