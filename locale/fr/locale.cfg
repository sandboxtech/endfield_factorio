# Explication en haut de la fenêtre des classes (ne parler que des classes, pas des autres systèmes)
class-help=Choisissez une [color=acid]classe[/color], elle détermine vos [color=acid]objets de départ de classe[/color]\nau début vous recevez gratuitement des [color=acid]objets de départ inconditionnels[/color]\navant le saut emportez davantage de [color=acid]fioles[/color] qu'elle utilise, plus ces fioles sont montées en niveau, plus vous recevez d'[color=acid]objets de départ supplémentaires[/color]\non ne peut en choisir qu'une à la fois, modifiable à tout moment, la classe actuelle porte [img=virtual-signal/signal-check]
