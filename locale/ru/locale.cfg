# ══ Система членства ══
# Система членства: /member выдать (админ/член) · /unmember отозвать (только админ, может отозвать у любого члена) · /kickout выгнать не-члена (член/админ); администратор всегда считается членом
not-member=Эту команду могут использовать только члены
member-help=Выдать членство, доступно администратору или члену. Использование /member <имя игрока>
unmember-help=Отозвать членство, только администратор. Использование /unmember <имя игрока>
kickout-help=Выгнать одного не-члена, доступно члену или администратору. Использование /kickout <имя игрока>
member-no-such=Нет игрока по имени [color=acid]__1__[/color]
member-already=[color=acid]__1__[/color] уже является членом
member-not=[color=acid]__1__[/color] не является членом
member-granted=[img=entity/character] [color=acid]__1__[/color] получил членство
member-revoked=[img=entity/character] членство [color=acid]__1__[/color] отозвано
member-kicked=[color=acid]__1__[/color] выгнан членом [color=yellow]__2__[/color]
kickout-self=Нельзя выгнать самого себя
kickout-protected=[color=acid]__1__[/color] член/администратор, выгнать нельзя
kickout-offline=[color=acid]__1__[/color] не в сети

# ══ Система классов ══
# Заголовок окна классов (открывается отдельной кнопкой HUD)
class-title=[img=virtual-signal/signal-mining] Выбор класса
# Пояснение вверху окна классов (только о классах, без других систем)
class-help=Выбери [color=acid]класс[/color], он определяет твои [color=acid]стартовые предметы класса[/color]\nВ начале сперва бесплатно даются [color=acid]безусловные стартовые предметы[/color]\nБери побольше [color=acid]колб[/color], которые он использует, перед прыжком, чем выше прокачаны эти колбы, тем больше [color=acid]дополнительных стартовых предметов[/color] дают в начале\nТолько один класс одновременно; менять можно в любой момент, вступает в силу со [color=yellow]следующего прыжка[/color]: [img=virtual-signal/signal-mining] зелёный = текущий класс; [img=virtual-signal/signal-check] синий = выбран на следующий прыжок; [img=virtual-signal/signal-deny] красный = скоро будет заменён
# Кнопки классов в окне классов: __1__ = имя класса (class-name-*), __2__ = иконка фирменного предмета этого класса
class-pick=__2__ __1__
# Подсказка после выбора (только себе): __1__ = имя класса
# Общесерверное объявление о смене класса: __1__ имя игрока, __2__ имя класса
class-changed=[color=acid]__1__[/color] хочет сменить класс на [color=acid]__2__[/color]
travel-fail-closed=В этом раунде нельзя отправиться на __1__ (шанс открытия __2__%)
travel-no-char=У тебя сейчас нет персонажа, нельзя отправиться на планету
travel-not-generated=Планета __1__ ещё не сгенерирована
travel-clear-first=Перед отправкой на планету сначала очисти четыре зоны: курсор, рюкзак, логистику (мусор), боеприпасы
roboport-limit=[color=red][Сеть роботов][/color] В одной сети роботов число роботопортов превысило лимит __1__ шт, вновь размещённый уничтожен и возвращён.
# Подсказка при наведении (собирается, каждая строка с \n переносом): строка бесплатного class-tip-head (__1__ общее число, __2__ иконка предмета); строка награды class-tip-reward
#   (__1__ иконка колбы=источник уровня, __2__ за сколько уровней, __3__ сколько в партии, __4__ иконка предмета, __5__ максимум на полном уровне; __2__:__3__ = линия макс. уровня:общее число на макс. уровне в простейшем отношении)
class-tip-head=\nБесплатно [color=acid]__1__[/color] шт __2__
class-tip-reward=\n__1__ за каждые [color=acid]__2__[/color] ур даёт [color=acid]__3__[/color] шт __4__ [color=acid]__5__/__6__[/color] шт
class-tip-tech=\n[color=acid]Откроется в начале[/color]
class-tip-tech-chance= [color=yellow](шанс __1__%)[/color]
class-tip-item-p= [color=yellow](__1__% за шт.)[/color]
