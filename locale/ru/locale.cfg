
description=\n[color=acid]«Factorio [font=infinite]Бесконечный прыжок[/font]»[/color]\n\n[space-age] [font=default-large-bold]Сюжет[/font]\nНаш общий родной мир, Tavis II, погиб.\nКогда [color=acid]обратный отсчёт[/color] закончится, мы обязаны [color=yellow]прыгнуть[/color] и бежать в новую звёздную систему.\n\n[img=virtual-signal/signal-clock] [font=default-large-bold]Обратный отсчёт[/font]\nКогда [color=acid]обратный отсчёт[/color] вверху закончится, ты [color=yellow]прыгаешь[/color] в новый мир, поначалу всего __1__ мин.\nИсследуй [color=yellow]технологии с колбами[/color], и [color=acid]обратный отсчёт[/color] продлится.\n\n[img=space-location/solar-system-edge] [font=default-large-bold]Прыжок[/font]\nКаждый [color=yellow]прыжок[/color] [color=red]бросает[/color] всю старую систему.\nТвои фабрики, исследования, руда и материалы все остаются позади.\nТолько [color=acid]опыт[/color] и [color=acid]корабль[/color] отправятся с тобой исследовать новую систему\n\n[img=virtual-signal/signal-science-pack] [font=default-large-bold]Опыт[/font]\nВ момент [color=yellow]прыжка[/color] [color=acid]колбы[/color] в твоём рюкзаке превращаются в [color=acid]опыт[/color].\nЕсть 12 видов [color=acid]опыта[/color], только твои, их нельзя потерять.\nКаждая обычная [color=acid]колба[/color] даёт 1 [color=acid]опыт[/color].\nЧем выше качество [color=acid]колбы[/color], тем больше [color=acid]опыта[/color] она даёт.\nЧем больше [color=acid]опыта[/color] накоплено, тем выше соответствующий [color=acid]уровень[/color], и тем больше припасов ты получишь от своего [color=acid]класса[/color] в начале.\n\n[img=virtual-signal/signal-mining][font=default-large-bold]Класс[/font]\nНажми кнопку вверху и выбери [color=acid]класс[/color], он определяет твои [color=acid]стартовые предметы класса[/color].\nВ начале сперва бесплатно даются [color=acid]безусловные стартовые предметы[/color].\nБери побольше [color=acid]колб[/color], которые он использует, перед прыжком, прокачивай соответствующий [color=acid]уровень[/color], и в начале получишь больше [color=acid]дополнительных стартовых предметов[/color].\n\n[img=virtual-signal/signal-heart] [font=default-large-bold]Корабль[/font]\nКорабль следует за тобой через системы, префикс имени показывает, сколько прыжков с ним ещё осталось.\nПоначалу __2__ раз, когда число [color=yellow][space-age]прыжков[/color] закончится, корабль идёт в утиль\n\n\nВерсия 20260604\n[img=entity/big-wriggler-pentapod] Группа сообщений об ошибках QQ 293280221\nАдрес проекта\nhttps://github.com/sandboxtech/endfield_factorio
scenario-name=[color=acid]Factorio [font=infinite]Бесконечный прыжок[/font][/color]
[wn]

