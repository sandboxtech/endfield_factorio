
description=\n[color=acid]《팩토리오 [font=infinite]엔드리스 워프[/font]》[/color]\n\n[space-age] [font=default-large-bold]스토리[/font]\n우리 모두의 고향, 타비스 II가 멸망했다.\n[color=acid]카운트다운[/color]이 끝나면, 우리는 새로운 성계로 [color=yellow]워프[/color]해 도망쳐야 한다.\n\n[img=virtual-signal/signal-clock] [font=default-large-bold]카운트다운[/font]\n상단 [color=acid]카운트다운[/color]이 끝나면 새 세계로 [color=yellow]워프[/color]하며, 처음엔 단 __1__ 분뿐이다.\n[color=yellow]과학 팩 기술[/color]을 연구하면 [color=acid]카운트다운[/color]이 연장된다.\n\n[img=space-location/solar-system-edge] [font=default-large-bold]워프[/font]\n매번 [color=yellow]워프[/color]할 때마다, 낡은 성계 전체가 [color=red]버려진다[/color].\n당신의 공장, 기술, 광물, 자재는 모두 낡은 성계에 남겨진다.\n오직 [color=acid]경험치[/color]와 [color=acid]함선[/color]만이 당신과 함께 새 성계를 탐험할 수 있다\n\n[img=virtual-signal/signal-science-pack] [font=default-large-bold]경험치[/font]\n[color=yellow]워프[/color]하는 순간, 가방 속 [color=acid]팩[/color]이 [color=acid]경험치[/color]로 변한다.\n[color=acid]경험치[/color]는 12종류이며, 오직 당신만의 것이고, 영원히 잃지 않는다.\n일반 [color=acid]팩[/color] 1개당 [color=acid]경험치[/color] 1점이 된다.\n[color=acid]팩[/color]의 품질이 높을수록 변하는 [color=acid]경험치[/color]가 더 많다.\n[color=acid]경험치[/color]를 많이 모을수록 해당 [color=acid]레벨[/color]이 높아지고, 시작 시 [color=acid]직업[/color]에서 받는 물자가 더 많아진다.\n\n[img=virtual-signal/signal-mining][font=default-large-bold]직업[/font]\n상단 버튼을 눌러 [color=acid]직업[/color]을 하나 고르면, 그것이 당신의 [color=acid]직업 시작 아이템[/color]을 결정한다.\n시작 시 먼저 [color=acid]무조건 시작 아이템[/color]을 공짜로 준다.\n워프 전에 그 직업이 쓰는 [color=acid]팩[/color]을 더 챙겨 해당 [color=acid]레벨[/color]을 올려두면, 시작 시 더 많은 [color=acid]추가 시작 아이템[/color]을 받는다.\n\n[img=virtual-signal/signal-heart] [font=default-large-bold]함선[/font]\n함선은 당신을 따라 성계를 넘나들며, 함명 접두사가 앞으로 몇 번 더 워프할 수 있는지 보여준다.\n처음엔 __2__ 회, [color=yellow][space-age]워프[/color] 횟수를 다 쓰면 함선은 폐기된다\n\n\n버전 번호 20260604\n[img=entity/big-wriggler-pentapod] BUG 제보 Q 그룹 293280221\n프로젝트 주소\nhttps://github.com/sandboxtech/endfield_factorio
scenario-name=[color=acid]팩토리오 [font=infinite]엔드리스 워프[/font][/color]
