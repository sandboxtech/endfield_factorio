# ══ 職業系統 ══
# 職業視窗標題（HUD 獨立按鈕打開）
class-title=[img=virtual-signal/signal-mining] 選擇職業
# 職業視窗頂部說明（只講職業，別提別的系統）
class-help=選一個[color=acid]職業[/color]，它決定你的[color=acid]職業初始物品[/color]\n開局先白送[color=acid]無條件初始物品[/color]\n躍遷前多帶它用到的[color=acid]瓶子[/color]，這些瓶子練得越高，開局送的[color=acid]額外初始物品[/color]就越多\n同時只能選一個，隨時能換，當前職業帶 [img=virtual-signal/signal-check]
# 職業視窗裡的職業按鈕：__1__ = 職業名（class-name-*），__2__ = 該職業招牌物品圖標
class-pick=__2__ __1__
class-cur=__2__ [img=virtual-signal/signal-check] __1__
# 選定後提示（僅本人）：__1__ = 職業名
class-set=已選擇職業 [color=acid]__1__[/color]\n下次開局開始贈送[color=acid]額外初始物品[/color]
# 切換職業全服公告：__1__ 玩家名，__2__ 職業名
class-changed=[color=acid]__1__[/color] 選擇了職業 [color=acid]__2__[/color]
travel-fail-closed=本輪無法前往 __1__（開放機率 __2__%）
travel-no-char=你現在沒有角色，無法前往星球
travel-not-generated=星球 __1__ 還沒生成
travel-clear-first=前往星球前，請先清空：滑鼠、背包、物流(回收)、彈藥 這四個區
roboport-limit=[color=red][機器人網路][/color] 單個機器人網路的 roboport 已超過上限 __1__ 個，新放置的已被摧毀並退還。
# 懸停說明(拼接,每行 \n 換行)：白送行 class-tip-head（__1__ 總個數，__2__ 物品圖標）；獎勵行 class-tip-reward
#   （__1__ 瓶圖標=等級來源，__2__ 每幾級，__3__ 每批幾個，__4__ 物品圖標，__5__ 滿級最多幾個；__2__:__3__ = 滿級線:滿級總數 的最簡比）
class-tip-head=\n白送 [color=acid]__1__[/color] 個 __2__
class-tip-reward=\n__1__ 每 [color=acid]__2__[/color] 級得 [color=acid]__3__[/color] 個 __4__ [color=acid]__5__/__6__[/color] 個
class-tip-tech=\n[color=acid]開局解鎖[/color] __1__
class-tip-recipe=\n[color=acid]開局配方[/color] __1__
# 解鎖條件行（需全部滿足）：__1__ 需求瓶圖標，__2__ 需求等級，__3__ 當前等級
class-tip-unlock=\n[color=red]解鎖需[/color] __1__ [color=acid]__2__[/color] 級 當前 __3__
# 點到未解鎖職業時的提示：__1__ = 職業名
class-locked-msg=[color=red]__1__[/color] 還沒解鎖，瓶子等級不夠
# 職業視窗分區小標題（gui.show_classes 用；英文環境走這裡，中文缺失則 fallback def.section 中文）
