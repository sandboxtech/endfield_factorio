
description=\n[color=acid]《異星工廠[font=infinite]無盡躍遷[/font]》[/color]\n\n[space-age] [font=default-large-bold]劇情[/font]\n我們共同的老家，塔衛二，毀滅了。\n如果[color=acid]倒數計時[/color]結束，我們就必須[color=yellow]躍遷[/color]逃離到新星系。\n\n[img=virtual-signal/signal-clock] [font=default-large-bold]倒數計時[/font]\n頂部[color=acid]倒數計時[/color]結束就[color=yellow]躍遷[/color]去新世界，初始只有 __1__ 分鐘。\n研究[color=yellow]瓶子科技[/color]，[color=acid]倒數計時[/color]會延長。\n\n[img=space-location/solar-system-edge] [font=default-large-bold]躍遷[/font]\n每次[color=yellow]躍遷[/color]，整個舊星系將被[color=red]拋棄[/color]。\n你的工廠、科技、礦物、材料，全部被留在舊星系。\n只有[color=acid]經驗[/color]和[color=acid]飛船[/color]能陪你一同探索新星系\n\n[img=virtual-signal/signal-science-pack] [font=default-large-bold]經驗[/font]\n[color=yellow]躍遷[/color]瞬間，背包裡的[color=acid]瓶子[/color]，會變成[color=acid]經驗[/color]。\n[color=acid]經驗[/color]有12種，專屬於你一人，永遠不會失去。\n每1個普通[color=acid]瓶子[/color]，變成1點[color=acid]經驗[/color]。\n[color=acid]瓶子[/color]品質越高，變成的[color=acid]經驗[/color]越多。\n[color=acid]經驗[/color]攢得越多，對應[color=acid]等級[/color]越高，開局從[color=acid]職業[/color]拿到的物資就越多。\n\n[img=virtual-signal/signal-mining][font=default-large-bold]職業[/font]\n點頂部按鈕選一個[color=acid]職業[/color]，它決定你的[color=acid]職業初始物品[/color]。\n開局先白送[color=acid]無條件初始物品[/color]。\n躍遷前多帶它用到的[color=acid]瓶子[/color]，把對應[color=acid]等級[/color]練上去，開局就送更多[color=acid]額外初始物品[/color]。\n\n[img=virtual-signal/signal-heart] [font=default-large-bold]飛船[/font]\n飛船跟隨你跨越星系，船名前綴顯示還能隨你躍遷幾次。\n初始 __2__ 次，[color=yellow][space-age]躍遷[/color]次數用完，飛船報廢\n\n\n版本號 2026060119\n[img=entity/big-wriggler-pentapod] BUG 回報 Q 群 293280221\n專案位址\nhttps://github.com/sandboxtech/endfield_factorio
scenario-name=[color=acid]異星工廠[font=infinite]無盡躍遷[/font][/color]
[wn]

