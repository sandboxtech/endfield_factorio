member-kicked=[color=acid]__1__[/color] wurde vom Mitglied [color=yellow]__2__[/color] gekickt
kickout-self=Du kannst dich nicht selbst kicken
kickout-protected=[color=acid]__1__[/color] ist Mitglied/Admin und kann nicht gekickt werden
kickout-offline=[color=acid]__1__[/color] ist nicht online

# ══ Klassensystem ══
# Titel des Klassenfensters (über separate HUD-Schaltfläche geöffnet)
class-title=[img=virtual-signal/signal-mining] Klasse wählen
# Erklärung oben im Klassenfenster (nur über Klassen sprechen, keine anderen Systeme erwähnen)
class-help=Wähle eine [color=acid]Klasse[/color], sie bestimmt deine [color=acid]Klassen-Startgegenstände[/color]\nZu Beginn gibt es zuerst gratis die [color=acid]bedingungslosen Startgegenstände[/color]\nTrage vor dem Sprung mehr von den [color=acid]Paketen[/color], die sie nutzt, je höher diese Pakete sind, desto mehr [color=acid]zusätzliche Startgegenstände[/color] gibt es zu Beginn\nNur eine Klasse gleichzeitig; jederzeit wechselbar, gilt ab dem [color=yellow]nächsten Sprung[/color]: [img=virtual-signal/signal-mining] grün = aktive Klasse; [img=virtual-signal/signal-check] blau = für den nächsten Sprung vorgemerkt; [img=virtual-signal/signal-deny] rot = wird ersetzt
# Klassen-Schaltfläche im Klassenfenster: __1__ = Klassenname (class-name-*), __2__ = Markenzeichen-Symbol dieser Klasse
class-pick=__2__ __1__
# Hinweis nach Auswahl (nur an sich selbst): __1__ = Klassenname
# Serverweite Ankündigung beim Klassenwechsel: __1__ Spielername, __2__ Klassenname
class-changed=[color=acid]__1__[/color] möchte zur Klasse [color=acid]__2__[/color] wechseln
travel-fail-closed=Diese Runde keine Reise nach __1__ möglich (Öffnungswahrscheinlichkeit __2__%)
travel-no-char=Du hast gerade keinen Charakter und kannst nicht zu einem Planeten reisen
travel-not-generated=Planet __1__ ist noch nicht generiert
travel-clear-first=Leere vor der Reise zum Planeten zuerst diese vier Bereiche: Maus, Rucksack, Logistik (Müll), Munition
roboport-limit=[color=red][Roboternetzwerk][/color] Ein einzelnes Roboternetzwerk hat das Limit von __1__ Roboports überschritten, der neu platzierte wurde zerstört und erstattet.
# Tooltip-Erklärung (zusammengesetzt, jede Zeile mit \n umgebrochen): Gratis-Zeile class-tip-head (__1__ Gesamtanzahl, __2__ Gegenstandssymbol); Belohnungszeile class-tip-reward
#   (__1__ Paketsymbol=Stufenquelle, __2__ je wie viele Stufen, __3__ je Charge wie viele, __4__ Gegenstandssymbol, __5__ bei Maximalstufe höchstens wie viele; __2__:__3__ = einfachstes Verhältnis von Maximalstufengrenze:Maximalstufen-Gesamtzahl)
class-tip-head=\nGratis [color=acid]__1__[/color] Stück __2__
class-tip-reward=\n__1__ je [color=acid]__2__[/color] Stufen gibt [color=acid]__3__[/color] Stück __4__ [color=acid]__5__/__6__[/color] Stück
class-tip-tech=\n[color=acid]Zu Beginn freigeschaltet[/color]
class-tip-tech-chance= [color=yellow](__1__% Chance)[/color]
class-tip-item-p= [color=yellow](__1__% pro Stück)[/color]
# 概率科技/配方掷点结果（发给该职业在线玩家）：__1__ 图标，__2__ 本地化名
class-roll-hit=[img=virtual-signal/signal-check] Diese Welt freigeschaltet: __1__ [color=acid]__2__[/color]
class-roll-hit-levels=[img=virtual-signal/signal-check] Diese Welt freigeschaltet: __1__ [color=acid]__2__[/color] (+__3__ Stufen)
class-roll-miss=[img=virtual-signal/signal-deny] Diese Welt nicht freigeschaltet: __1__ [color=red]__2__[/color] (nächster Sprung neu)
class-tip-recipe=\n[color=acid]Start-Rezepte:[/color]
# Freischaltbedingungszeile (alle müssen erfüllt sein): __1__ benötigtes Paketsymbol, __2__ benötigte Stufe, __3__ aktuelle Stufe
class-tip-unlock=\n[color=red]Freischaltung benötigt[/color] __1__ [color=acid]__2__[/color] Stufe aktuell __3__
# Hinweis beim Klick auf eine nicht freigeschaltete Klasse: __1__ = Klassenname
class-locked-msg=[color=red]__1__[/color] noch nicht freigeschaltet, Paketstufe zu niedrig
