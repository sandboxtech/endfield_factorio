
description=\n[color=acid]Factorio [font=infinite]Endloser Sprung[/font][/color]\n\n[space-age] [font=default-large-bold]Geschichte[/font]\nUnsere gemeinsame alte Heimat, Tavis II, ist zerstört.\nWenn der [color=acid]Countdown[/color] endet, müssen wir per [color=yellow]Sprung[/color] in ein neues System fliehen.\n\n[img=virtual-signal/signal-clock] [font=default-large-bold]Countdown[/font]\nWenn der obere [color=acid]Countdown[/color] endet, [color=yellow]springst[/color] du in eine neue Welt, anfangs nur __1__ Minuten.\nErforsche [color=yellow]Forschungspaket-Technologien[/color], und der [color=acid]Countdown[/color] verlängert sich.\n\n[img=space-location/solar-system-edge] [font=default-large-bold]Sprung[/font]\nBei jedem [color=yellow]Sprung[/color] wird das gesamte alte System [color=red]aufgegeben[/color].\nDeine Fabriken, Forschungen, Erze und Materialien bleiben alle zurück.\nNur [color=acid]Erfahrung[/color] und dein [color=acid]Schiff[/color] begleiten dich in das neue System.\n\n[img=virtual-signal/signal-science-pack] [font=default-large-bold]Erfahrung[/font]\nIm Moment des [color=yellow]Sprungs[/color] werden die [color=acid]Pakete[/color] in deinem Rucksack zu [color=acid]Erfahrung[/color].\nEs gibt 12 Arten von [color=acid]Erfahrung[/color], nur dir gehörend, niemals verloren.\nJedes gewöhnliche [color=acid]Paket[/color] wird zu 1 Punkt [color=acid]Erfahrung[/color].\nJe höher die Qualität des [color=acid]Pakets[/color], desto mehr [color=acid]Erfahrung[/color] entsteht.\nJe mehr [color=acid]Erfahrung[/color] du sammelst, desto höher die entsprechende [color=acid]Stufe[/color], und desto mehr Material erhältst du zu Beginn von deiner [color=acid]Klasse[/color].\n\n[img=virtual-signal/signal-mining][font=default-large-bold]Klasse[/font]\nWähle über die obere Schaltfläche eine [color=acid]Klasse[/color], sie bestimmt deine [color=acid]Klassen-Startgegenstände[/color].\nZu Beginn gibt es zuerst gratis die [color=acid]bedingungslosen Startgegenstände[/color].\nTrage vor dem Sprung mehr von den [color=acid]Paketen[/color], die sie nutzt, und steigere so die entsprechende [color=acid]Stufe[/color], dann gibt es zu Beginn mehr [color=acid]zusätzliche Startgegenstände[/color].\n\n[img=virtual-signal/signal-heart] [font=default-large-bold]Schiff[/font]\nDas Schiff folgt dir über die Systeme hinweg, das Präfix des Schiffsnamens zeigt, wie oft du noch springen kannst.\nAnfangs __2__ Mal; sind die [color=yellow]Sprünge[/color] [space-age] aufgebraucht, wird das Schiff verschrottet\n\n\nVersion 20260604\n[img=entity/big-wriggler-pentapod] BUG-Meldung QQ-Gruppe 293280221\nProjektadresse\nhttps://github.com/sandboxtech/endfield_factorio
scenario-name=[color=acid]Factorio [font=infinite]Endloser Sprung[/font][/color]
[wn]

