
description=\n[color=acid]Factorio [font=infinite]Salto Infinito[/font][/color]\n\n[space-age] [font=default-large-bold]Historia[/font]\nTavis II, nuestro hogar común, ha sido destruido.\nCuando termine la [color=acid]cuenta atrás[/color], debemos [color=yellow]saltar[/color] y huir a un nuevo sistema.\n\n[img=virtual-signal/signal-clock] [font=default-large-bold]Cuenta atrás[/font]\nCuando la [color=acid]cuenta atrás[/color] de arriba termina, [color=yellow]saltas[/color] a un nuevo mundo, solo __1__ minutos al principio.\nInvestiga [color=yellow]tecnología de frascos de ciencia[/color] y la [color=acid]cuenta atrás[/color] se alarga.\n\n[img=space-location/solar-system-edge] [font=default-large-bold]Salto[/font]\nCada [color=yellow]salto[/color] [color=red]abandona[/color] todo el sistema antiguo.\nTus fábricas, investigaciones, minerales y materiales se quedan atrás.\nSolo la [color=acid]experiencia[/color] y tu [color=acid]nave[/color] te acompañan a explorar el nuevo sistema\n\n[img=virtual-signal/signal-science-pack] [font=default-large-bold]EXP[/font]\nEn el instante en que [color=yellow]saltas[/color], los [color=acid]frascos[/color] de tu mochila se convierten en [color=acid]experiencia[/color].\nHay 12 tipos de [color=acid]experiencia[/color], solo tuyos, nunca se pierden.\nCada [color=acid]frasco[/color] común se convierte en 1 punto de [color=acid]experiencia[/color].\nCuanto mayor sea la calidad del [color=acid]frasco[/color], más [color=acid]experiencia[/color] da.\nCuanta más [color=acid]experiencia[/color] acumules, más alto será el [color=acid]nivel[/color] correspondiente y más recursos recibirás de tu [color=acid]profesión[/color] al empezar.\n\n[img=virtual-signal/signal-mining][font=default-large-bold]Profesión[/font]\nPulsa el botón de arriba para elegir una [color=acid]profesión[/color]; ella decide tus [color=acid]objetos iniciales de profesión[/color].\nAl empezar recibes gratis los [color=acid]objetos iniciales incondicionales[/color].\nLleva antes del salto los [color=acid]frascos[/color] que usa para subir el [color=acid]nivel[/color] correspondiente, y recibirás más [color=acid]objetos iniciales adicionales[/color] al empezar.\n\n[img=virtual-signal/signal-heart] [font=default-large-bold]Nave[/font]\nLa nave te sigue entre sistemas; el prefijo de su nombre muestra cuántos saltos te quedan.\n__2__ al principio; cuando se acaban los [color=yellow]saltos[/color] [space-age], la nave se desguaza\n\n\nVersión 20260604\n[img=entity/big-wriggler-pentapod] Grupo Q de reportes de errores 293280221\nDirección del proyecto\nhttps://github.com/sandboxtech/endfield_factorio
scenario-name=[color=acid]Factorio [font=infinite]Salto Infinito[/font][/color]
[wn]

