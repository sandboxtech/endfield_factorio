# ══ Sistema de profesiones ══
# Título de la ventana de profesión (se abre con un botón independiente del HUD)
class-title=[img=virtual-signal/signal-mining] Elegir profesión
# Explicación superior de la ventana de profesión (solo habla de profesiones, no menciona otros sistemas)
class-help=Elige una [color=acid]profesión[/color]; ella decide tus [color=acid]objetos iniciales de profesión[/color]\nAl empezar recibes gratis los [color=acid]objetos iniciales incondicionales[/color]\nLleva antes del salto los [color=acid]frascos[/color] que usa; cuanto más alto subas esos frascos, más [color=acid]objetos iniciales adicionales[/color] recibirás al empezar\nSolo una profesión a la vez; cámbiala cuando quieras, surte efecto en el [color=yellow]próximo salto[/color]: [img=virtual-signal/signal-mining] verde = profesión actual; [img=virtual-signal/signal-check] azul = reservada para el próximo salto; [img=virtual-signal/signal-deny] rojo = a punto de ser reemplazada
# Botones de profesión en la ventana de profesión: __1__ = nombre de profesión (class-name-*), __2__ = icono del objeto insignia de esa profesión
class-pick=__2__ __1__
# Aviso tras seleccionar (solo para uno mismo): __1__ = nombre de profesión
# Anuncio a todo el servidor al cambiar de profesión: __1__ nombre del jugador, __2__ nombre de profesión
class-changed=[color=acid]__1__[/color] quiere cambiar a la profesión [color=acid]__2__[/color]
travel-fail-closed=Esta ronda no se puede viajar a __1__ (probabilidad de apertura __2__%)
travel-no-char=Ahora mismo no tienes personaje, no puedes viajar a un planeta
travel-not-generated=El planeta __1__ aún no se ha generado
travel-clear-first=Antes de viajar a un planeta, vacía primero estas cuatro zonas: ratón, mochila, logística (papelera) y munición
roboport-limit=[color=red][Red de robots][/color] La red de un solo robot ha superado el límite de __1__ puertos de robot; el recién colocado ha sido destruido y reembolsado.
# Explicación al pasar el ratón (concatenada, cada línea con \n): línea de regalo class-tip-head (__1__ número total, __2__ icono del objeto); línea de recompensa class-tip-reward
#   (__1__ icono de frasco=origen del nivel, __2__ cada cuántos niveles, __3__ cuántos por lote, __4__ icono del objeto, __5__ máximo a nivel máximo; __2__:__3__ = línea de nivel máximo:total a nivel máximo en proporción simplificada)
class-tip-head=\nGratis [color=acid]__1__[/color] __2__
class-tip-reward=\n__1__ cada [color=acid]__2__[/color] niveles da [color=acid]__3__[/color] __4__ [color=acid]__5__/__6__[/color]
class-tip-tech=\n[color=acid]Desbloquea al inicio[/color]
class-tip-tech-chance= [color=yellow](__1__% de probabilidad)[/color]
class-tip-item-p= [color=yellow](__1__% por unidad)[/color]
# 概率科技/配方掷点结果（发给该职业在线玩家）：__1__ 图标，__2__ 本地化名
class-roll-hit=[img=virtual-signal/signal-check] Desbloqueado este mundo: __1__ [color=acid]__2__[/color]
class-roll-hit-levels=[img=virtual-signal/signal-check] Desbloqueado este mundo: __1__ [color=acid]__2__[/color] (+__3__ niveles)
class-roll-miss=[img=virtual-signal/signal-deny] No desbloqueado este mundo: __1__ [color=red]__2__[/color] (nueva tirada tras el salto)
class-tip-recipe=\n[color=acid]Recetas iniciales:[/color]
# Línea de condición de desbloqueo (deben cumplirse todas): __1__ icono del frasco requerido, __2__ nivel requerido, __3__ nivel actual
class-tip-unlock=\n[color=red]Desbloqueo requiere[/color] __1__ [color=acid]__2__[/color] nivel  actual __3__
# Aviso al pulsar una profesión no desbloqueada: __1__ = nombre de profesión
class-locked-msg=[color=red]__1__[/color] aún no está desbloqueada, el nivel de los frascos es insuficiente
