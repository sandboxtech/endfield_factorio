
description=\n[color=acid]Factorio [font=infinite]Nieskończony Skok[/font][/color]\n\n[space-age] [font=default-large-bold]Fabuła[/font]\nNasz wspólny dom, Tavis II, został zniszczony.\nGdy [color=acid]odliczanie[/color] się skończy, musimy wykonać [color=yellow]skok[/color] do nowego układu.\n\n[img=virtual-signal/signal-clock] [font=default-large-bold]Odliczanie[/font]\nGdy górne [color=acid]odliczanie[/color] dobiegnie końca, wykonujesz [color=yellow]skok[/color] do nowego świata, na początku tylko __1__ min.\nBadaj [color=yellow]technologie fiolek[/color], a [color=acid]odliczanie[/color] się wydłuży.\n\n[img=space-location/solar-system-edge] [font=default-large-bold]Skok[/font]\nKażdy [color=yellow]skok[/color] [color=red]porzuca[/color] cały stary układ.\nTwoje fabryki, technologie, rudy i materiały zostają w starym układzie.\nTylko [color=acid]doświadczenie[/color] i [color=acid]statek[/color] towarzyszą ci w eksploracji nowego układu\n\n[img=virtual-signal/signal-science-pack] [font=default-large-bold]Doświadczenie[/font]\nW chwili [color=yellow]skoku[/color] [color=acid]fiolki[/color] w twoim plecaku zamieniają się w [color=acid]doświadczenie[/color].\nIstnieje 12 rodzajów [color=acid]doświadczenia[/color], należą tylko do ciebie i nigdy nie giną.\nKażda zwykła [color=acid]fiolka[/color] daje 1 punkt [color=acid]doświadczenia[/color].\nIm wyższa jakość [color=acid]fiolki[/color], tym więcej [color=acid]doświadczenia[/color].\nIm więcej [color=acid]doświadczenia[/color], tym wyższy odpowiedni [color=acid]poziom[/color] i tym więcej zasobów dostaniesz na starcie od swojej [color=acid]klasy[/color].\n\n[img=virtual-signal/signal-mining][font=default-large-bold]Klasa[/font]\nKliknij górny przycisk, by wybrać [color=acid]klasę[/color], która decyduje o twoich [color=acid]początkowych przedmiotach klasy[/color].\nNa starcie najpierw dostajesz za darmo [color=acid]bezwarunkowe przedmioty początkowe[/color].\nNoś przed skokiem więcej [color=acid]fiolek[/color], których używa, podnoś odpowiedni [color=acid]poziom[/color], a na starcie dostaniesz więcej [color=acid]dodatkowych przedmiotów początkowych[/color].\n\n[img=virtual-signal/signal-heart] [font=default-large-bold]Statek[/font]\nStatek towarzyszy ci między układami, przedrostek w jego nazwie pokazuje, ile skoków ci jeszcze zostało.\nNa początku __2__, gdy liczba [color=yellow][space-age]skoków[/color] się wyczerpie, statek trafia na złom\n\n\nWersja 20260604\n[img=entity/big-wriggler-pentapod] Zgłaszanie błędów, grupa Q 293280221\nAdres projektu\nhttps://github.com/sandboxtech/endfield_factorio
scenario-name=[color=acid]Factorio [font=infinite]Nieskończony Skok[/font][/color]
[wn]

