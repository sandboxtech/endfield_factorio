# Skrót "zobacz siebie" na samej górze listy (tylko gdy wielu graczy online)
stats-view-self=[img=entity/character] Zobacz siebie
# Tytuł szczegółów po kliknięciu gracza: __1__ = nazwa gracza
stats-of-header=[img=entity/character] Dane gracza __1__
stats-help=Twoje osobiste dane\n[color=acid]Tworzenie, ruch, kopanie[/color] im więcej robisz, tym szybsza odpowiednia prędkość, na starcie 50% .\n\n[img=item/coin] [color=acid][font=default-bold]Monety[/font][/color]\nNa każdym starcie dostajesz porcję monet, by kupić wyposażenie na rynku\nCzas bezczynności podnosi poziom, liczba przyznawanych monet równa się poziomowi.\n

# ══ Pomoc komend administratora ══
# Pomoc komend
run-reset-help=Ręcznie wyzwala skok, wymaga uprawnień administratora
# Debug generowania świata (administrator, podgląd bez ogłaszania innym graczom): __1__ aktualny numer świata
gen-debug-header=[img=virtual-signal/signal-info] Informacje o generowaniu świata __1__
gen-debug-none=Brak informacji o generowaniu, sprawdź po wygenerowaniu planet przy następnym skoku
# ══ System członkostwa ══
# System członkostwa: /member nadaje (administrator/członek) · /unmember odbiera (tylko administrator, może odebrać każdemu członkowi) · /kickout wyrzuca nie-członka (członek/administrator); administrator zawsze liczy się jako członek
not-member=Tylko członkowie mogą użyć tej komendy
member-help=Nadaje członkostwo, dostępne dla administratora lub członka. Użycie /member <gracz>
unmember-help=Odbiera członkostwo, tylko dla administratora. Użycie /unmember <gracz>
kickout-help=Wyrzuca jednego nie-członka, dostępne dla członka lub administratora. Użycie /kickout <gracz>
member-no-such=Nie ma gracza o nazwie [color=acid]__1__[/color]
member-already=[color=acid]__1__[/color] jest już członkiem
member-not=[color=acid]__1__[/color] nie jest członkiem
member-granted=[img=entity/character] [color=acid]__1__[/color] otrzymał członkostwo
member-revoked=[img=entity/character] członkostwo gracza [color=acid]__1__[/color] zostało odebrane
member-kicked=[color=acid]__1__[/color] został wyrzucony przez członka [color=yellow]__2__[/color]
kickout-self=Nie możesz wyrzucić samego siebie
kickout-protected=[color=acid]__1__[/color] jest członkiem/administratorem, nie można go wyrzucić
kickout-offline=[color=acid]__1__[/color] jest offline

# ══ System klas ══
# Tytuł okna klas (otwierany osobnym przyciskiem HUD)
class-title=[img=virtual-signal/signal-mining] Wybierz klasę
# Opis na górze okna klas (mówi tylko o klasach, nie wspomina o innych systemach)
class-help=Wybierz [color=acid]klasę[/color], decyduje ona o twoich [color=acid]początkowych przedmiotach klasy[/color]\nNa starcie najpierw dostajesz za darmo [color=acid]bezwarunkowe przedmioty początkowe[/color]\nNoś przed skokiem więcej [color=acid]fiolek[/color], których używa, im wyżej je wytrenujesz, tym więcej [color=acid]dodatkowych przedmiotów początkowych[/color] dostaniesz na starcie\nTylko jedna klasa naraz; zmieniaj kiedy chcesz — obowiązuje od [color=yellow]następnego skoku[/color]: [img=virtual-signal/signal-mining] zielony = obecna klasa; [img=virtual-signal/signal-check] niebieski = zarezerwowana na następny skok; [img=virtual-signal/signal-deny] czerwony = wkrótce zastąpiona
# Przycisk klasy w oknie klas: __1__ = nazwa klasy (class-name-*), __2__ = ikona charakterystycznego przedmiotu tej klasy
class-pick=__2__ __1__
# Komunikat po wyborze (tylko dla danego gracza): __1__ = nazwa klasy
# Ogłoszenie zmiany klasy dla całego serwera: __1__ nazwa gracza, __2__ nazwa klasy
class-changed=[color=acid]__1__[/color] chce zmienić klasę na [color=acid]__2__[/color]
travel-fail-closed=W tej rundzie nie można udać się na __1__ (szansa otwarcia __2__%)
travel-no-char=Nie masz teraz postaci, nie możesz udać się na planetę
travel-not-generated=Planeta __1__ nie została jeszcze wygenerowana
travel-clear-first=Przed udaniem się na planetę opróżnij najpierw cztery obszary: kursor, plecak, logistykę (odzysk), amunicję
roboport-limit=[color=red][Sieć robotów][/color] Pojedyncza sieć robotów przekroczyła limit __1__ roboportów, nowo postawiony został zniszczony i zwrócony.
# Opisy po najechaniu (sklejane, każda linia \n): linia darmowa class-tip-head (__1__ łączna liczba, __2__ ikona przedmiotu); linia nagrody class-tip-reward
#   (__1__ ikona fiolki=źródło poziomu, __2__ co ile poziomów, __3__ ile sztuk w partii, __4__ ikona przedmiotu, __5__ maks ile sztuk na pełnym poziomie; __2__:__3__ = linia pełnego poziomu:całość na pełnym poziomie w najprostszej proporcji)
class-tip-head=\nGratis [color=acid]__1__[/color] szt __2__
class-tip-reward=\n__1__ co [color=acid]__2__[/color] poz dostajesz [color=acid]__3__[/color] szt __4__ [color=acid]__5__/__6__[/color] szt
class-tip-tech=\n[color=acid]Odblokowane na start[/color]
class-tip-tech-chance= [color=yellow](__1__% szansy)[/color]
class-tip-item-p= [color=yellow](__1__% na sztukę)[/color]
# 概率科技/配方掷点结果（发给该职业在线玩家）：__1__ 图标，__2__ 本地化名
class-roll-hit=[img=virtual-signal/signal-check] Odblokowane w tym świecie: __1__ [color=acid]__2__[/color]
class-roll-hit-levels=[img=virtual-signal/signal-check] Odblokowane w tym świecie: __1__ [color=acid]__2__[/color] (+__3__ poz.)
class-roll-miss=[img=virtual-signal/signal-deny] Nieodblokowane w tym świecie: __1__ [color=red]__2__[/color] (ponowny rzut po skoku)
class-tip-recipe=\n[color=acid]Receptury startowe:[/color]
# Linia warunku odblokowania (wszystkie muszą być spełnione): __1__ wymagana ikona fiolki, __2__ wymagany poziom, __3__ aktualny poziom
class-tip-unlock=\n[color=red]Odblokowanie wymaga[/color] __1__ [color=acid]__2__[/color] poz aktualnie __3__
# Komunikat przy kliknięciu nieodblokowanej klasy: __1__ = nazwa klasy
class-locked-msg=[color=red]__1__[/color] jeszcze nieodblokowana, poziom fiolek za niski
