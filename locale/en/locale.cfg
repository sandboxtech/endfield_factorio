description=\n[color=acid]Factorio [font=infinite]Endless Warp[/font][/color]\n\n[space-age] [font=default-large-bold]Story[/font]\nTavis II, our shared home, is gone.\nWhen the [color=acid]countdown[/color] ends, we must [color=yellow]warp[/color] away to a new system.\n\n[img=virtual-signal/signal-clock] [font=default-large-bold]Countdown[/font]\nWhen the top [color=acid]countdown[/color] ends you [color=yellow]warp[/color] to a new world, only __1__ min at first.\nResearch [color=yellow]science-pack tech[/color] and the [color=acid]countdown[/color] extends.\n\n[img=space-location/solar-system-edge] [font=default-large-bold]Warp[/font]\nEvery [color=yellow]warp[/color] [color=red]abandons[/color] the whole old system.\nYour factories, research, ores and materials all stay behind.\nOnly [color=acid]exp[/color] and your [color=acid]ship[/color] come with you into the new system\n\n[img=virtual-signal/signal-science-pack] [font=default-large-bold]EXP[/font]\nThe instant you [color=yellow]warp[/color], the [color=acid]packs[/color] in your bag turn into [color=acid]exp[/color].\nThere are 12 kinds of [color=acid]exp[/color], yours alone, never lost.\nEach common [color=acid]pack[/color] becomes 1 [color=acid]exp[/color].\nHigher quality [color=acid]packs[/color] give more [color=acid]exp[/color].\nMore [color=acid]exp[/color] means higher [color=acid]levels[/color] and more starting items from your [color=acid]class[/color].\n\n[img=virtual-signal/signal-mining] [font=default-large-bold]Class[/font]\nPick a [color=acid]class[/color] from the top button; it decides your [color=acid]starting items[/color].\nIt gives [color=acid]guaranteed items[/color] at start.\nCarry the [color=acid]packs[/color] it uses before a warp to raise their [color=acid]level[/color], and get more [color=acid]bonus items[/color] at start.\n\n[img=virtual-signal/signal-heart] [font=default-large-bold]Ship[/font]\nYour ship follows you across systems; its name prefix shows how many warps are left.\n__2__ at first; when the [color=yellow]warps[/color] run out the ship is scrapped\n\n\nv2026060119\n[img=entity/big-wriggler-pentapod] QQ 293280221\nhttps://github.com/sandboxtech/endfield_factorio
scenario-name=[color=acid]Factorio [font=infinite]Endless Warp[/font][/color]

[wn]

