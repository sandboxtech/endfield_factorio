description=[space-age][color=acid]Factorio[font=infinite]Endfield[/font][/color]\n\nTavis II is gone.\nOur people are scattered across the stars, warping[img=space-location/solar-system-edge] to a new system every so often and starting from scratch.\n\nEvery warp [color=red]abandons the whole galaxy[/color].\nYour factories, your research, your ores, all left behind in the old world.\n\nThe only thing you take with you is [color=acid]the science packs in your inventory[/color][img=virtual-signal/signal-science-pack].\nThey add up permanently, giving you [color=acid]more starting items every round from now on[/color].\nSo before a warp, pack in as many as you can.\n\n[img=virtual-signal/signal-info] New here? Type [color=acid]/tutorial[/color] for the full guide\n\nv20260529  ·  [img=entity/big-wriggler-pentapod] QQ 293280221\n\n__1__\n\nhttps://github.com/sandboxtech/endfield_factorio
