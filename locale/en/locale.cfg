description=[space-age][color=acid]Factorio[font=infinite]Endfield[/font][/color]\n\nTavis II is gone. Refugees are scattered across new star systems, [color=yellow]warping[/color][img=space-location/solar-system-edge] to a fresh galaxy every so often and starting over. You're one of them.\n\nEach warp [color=red]wipes the galaxy clean[/color]. Your factories, your research, every ore patch you found, all of it.\n\nThe good news: at the moment of warp, the science packs[img=virtual-signal/signal-science-pack] [color=acid]in your inventory[/color] become your [color=acid]starting items next round[/color]. The more you carry, the richer you start.\n\n[img=item/exoskeleton-equipment] Train by doing: craft→craft speed · walk→move speed · mine→mining speed · die→max health\n\n[img=virtual-signal/signal-clock] The warp timer starts at 1 hour. Researching a new science-pack tech adds another hour.\n[img=item/rocket-part] Each rocket launched: warp timer [color=red]-1 min[/color].\n\n[img=virtual-signal/signal-info] Commands:\n[color=acid]/inspect[/color] <player> view exp\n[color=acid]/life[/color] warp timer\n\nv20260521  ·  [img=entity/big-wriggler-pentapod] QQ 293280221\n\n__1__\n\nhttps://github.com/sandboxtech/endfield_factorio
