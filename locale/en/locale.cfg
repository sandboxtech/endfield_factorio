description=[space-age]Welcome to [color=acid]Factorio[font=infinite]Endfield[/font]![/color]\n\nOur homeworld [font=infinite]Tavis II[/font] was destroyed; our people have become refugees.\n\nWe must keep [color=yellow][font=default-large-bold]warping[/font][/color] to new star systems [img=space-location/solar-system-edge] to find a new home.\n\n[img=virtual-signal/signal-info] Rules:\n  · Each round lasts 1 hour by default. When time runs out, all planets are wiped, all research is reset, and any player on a planet dies.\n  · Researching a new [img=virtual-signal/signal-science-pack][color=yellow]science-pack technology[/color] extends this round's warp timer by [color=acid]+1 hour[/color].\n  · Each warp prepends one [virtual-signal=signal-skull] to a platform's [img=item/space-platform-foundation] name. Platforms exceeding their lifetime are destroyed.\n  · On warp, each online player gains permanent experience based on science packs in their inventory: one stack = 1/2/3/4/5 pts by quality (normal/uncommon/rare/epic/legendary).\n  · When a player joins, their accumulated experience is broadcast.\n\nBefore each [color=yellow][font=default-large-bold]warp[/font][/color], stock your platform [img=item/space-platform-foundation] for the next round.\n\nVersion 20260521\n[img=entity/big-wriggler-pentapod] Feedback QQ group 293280221\n\n__1__
