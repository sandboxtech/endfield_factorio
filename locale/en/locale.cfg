description=[space-age]Welcome to [color=acid]Factorio[font=infinite]Endfield[/font]![/color]\n\nOur homeworld [font=infinite]Tavis II[/font] was destroyed, and our people have become refugees.\n\nWe can research the precious [color=yellow][font=default-large-bold]Permanent Productivity Technology[/font][/color], activate the Stargate, only to continuously perform [color=yellow][font=default-large-bold]Warp Jumps[/font][/color],\ntraveling to new star systems [img=space-location/solar-system-edge] to explore and pioneer, searching for a new home.\n\n[img=virtual-signal/signal-science-pack][color=yellow][font=default-large-bold]Permanent Productivity Technology[/font][/color] includes [img=technology/mining-productivity-3][img=technology/steel-plate-productivity][img=technology/plastic-bar-productivity][img=technology/low-density-structure-productivity][img=technology/rocket-fuel-productivity][img=technology/processing-unit-productivity][img=technology/rocket-part-productivity][img=technology/research-productivity]\nWhen research completes, a [color=yellow][font=default-large-bold]Warp Jump[/font][/color] will be instantly initiated,\nwhile cumulatively granting more and more [img=virtual-signal/signal-science-pack][color=yellow][font=default-large-bold]Permanent Productivity Technology[/font][/color].\n\nHowever, Warp Jumps cause loss of other research and loss of the player inventory.\nThe Platform [img=item/space-platform-foundation] is single-use, allowing only one Warp Jump.\nWhen attempting a second Warp Jump, the Platform [img=item/space-platform-foundation] will be permanently destroyed.\nPlatforms that have already performed a Warp Jump will have a [virtual-signal=signal-skull] prefix added to their name to distinguish if they have already jumped once.\n\nBefore a [color=yellow][font=default-large-bold]Warp Jump[/font][/color], prepare supplies on the Platform [img=item/space-platform-foundation] for the next star system to aid the subsequent pioneering effort.\n

