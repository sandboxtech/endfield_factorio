
description=[space-age]欢迎来到[color=acid]《异星工厂[font=infinite]终末地旅行[/font]》[/color]！\n\n我们的老家[font=infinite]塔卫二[/font]毁灭了，我们高贵的族人沦为难民。\n\n我们只能研究宝贵的[color=yellow][font=default-large-bold]永久产能科技[/font][/color]，激活星门，以便不断进行[color=yellow][font=default-large-bold]跃迁[/font][/color]，\n前往新的星系[img=space-location/solar-system-edge]探索开荒，寻找新的家园。\n\n[img=virtual-signal/signal-science-pack][color=yellow][font=default-large-bold]永久产能科技[/font][/color]包括[img=technology/mining-productivity-3][img=technology/steel-plate-productivity][img=technology/plastic-bar-productivity][img=technology/low-density-structure-productivity][img=technology/rocket-fuel-productivity][img=technology/processing-unit-productivity][img=technology/rocket-part-productivity][img=technology/research-productivity]\n研究完成时，将瞬间启动[color=yellow][font=default-large-bold]跃迁[/font][/color]，\n同时累计获得越来越多的[img=virtual-signal/signal-science-pack][color=yellow][font=default-large-bold]永久产能科技[/font][/color]。\n\n但是跃迁会损失其他科技、损失玩家背包\n平台[img=item/space-platform-foundation]是一次性的，只可以跃迁一次。\n平台[img=item/space-platform-foundation]第二次跃迁时，将永久损坏。\n已经跃迁过的平台名称会有[virtual-signal=signal-skull]前缀标记，用以区分平台是否已经跃迁过一次。\n\n[color=yellow][font=default-large-bold]跃迁[/font][/color]之前，在平台[img=item/space-platform-foundation]上准备好前往下个星系的物资，帮助下次开荒。\n\n版本号20260122\n[img=entity/big-wriggler-pentapod]BUG反馈 Q群 293280221\n\n__1__

