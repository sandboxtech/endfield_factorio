description=\n[color=acid]Factorio [font=infinite]Endless Warp[/font][/color]\n\n[space-age] [font=default-large-bold]Story[/font]\nTavis II, our shared homeworld, is gone.\nWhen the [color=acid]countdown[/color] hits zero, we must [color=yellow]warp[/color] away to a new galaxy.\n\n[img=virtual-signal/signal-clock] [font=default-large-bold]Countdown[/font]\nWhen the [color=acid]countdown[/color] at the top hits zero, you [color=yellow]warp[/color] to a new world, just __1__ min to begin with.\nResearch [color=yellow]science-pack tech[/color] to extend the [color=acid]countdown[/color].\n\n[img=space-location/solar-system-edge] [font=default-large-bold]Warp[/font]\nEvery [color=yellow]warp[/color] [color=red]abandons[/color] the entire old galaxy.\nYour factories, research, ores and materials are all left behind.\nOnly your [color=acid]exp[/color] and your [color=acid]ship[/color] travel with you into the new galaxy.\n\n[img=virtual-signal/signal-science-pack] [font=default-large-bold]EXP[/font]\nThe instant you [color=yellow]warp[/color], the [color=acid]packs[/color] in your bag turn into [color=acid]exp[/color].\nThere are 12 kinds of [color=acid]exp[/color], yours alone, never lost.\nEach common [color=acid]pack[/color] becomes 1 [color=acid]exp[/color].\nHigher-quality [color=acid]packs[/color] are worth more [color=acid]exp[/color].\nThe more [color=acid]exp[/color] you bank, the higher your [color=acid]levels[/color], and the more starting gear your [color=acid]class[/color] hands you.\n\n[img=virtual-signal/signal-mining] [font=default-large-bold]Class[/font]\nPick a [color=acid]class[/color] from the top button; it decides your [color=acid]starting items[/color].\nEvery start, it gives you [color=acid]guaranteed items[/color] for free.\nCarry the [color=acid]packs[/color] it uses before a warp to raise their [color=acid]level[/color], and earn more [color=acid]bonus items[/color] at the next start.\n\n[img=virtual-signal/signal-heart] [font=default-large-bold]Ship[/font]\nYour ship follows you across galaxies; the prefix on its name shows how many warps it has left.\n__2__ at first; once the [color=yellow]warps[/color] run out, the ship is scrapped\n\n\nv20260604\n[img=entity/big-wriggler-pentapod] QQ 293280221\nhttps://github.com/sandboxtech/endfield_factorio
scenario-name=[color=acid]Factorio [font=infinite]Endless Warp[/font][/color]

