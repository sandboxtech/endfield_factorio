
description=欢迎来到[color=acid]《异星工厂[font=infinite]终末旅行[/font]》[/color]！\n\n研究宝贵的[img=virtual-signal/signal-science-pack][color=yellow][font=default-large-bold]永久科技[/font][/color]\n[img=technology/mining-productivity-3][img=technology/steel-plate-productivity][img=technology/plastic-bar-productivity][img=technology/low-density-structure-productivity][img=technology/rocket-fuel-productivity][img=technology/processing-unit-productivity][img=technology/rocket-part-productivity][img=technology/research-productivity]\n将强制[space-age][color=yellow][font=default-large-bold]跃迁[/font][/color]至新星系[img=space-location/solar-system-edge]\n\n[color=yellow][font=default-large-bold]跃迁[/font][/color]会损失其他科技、损失玩家背包\n但是可以保留平台[img=item/space-platform-foundation]\n\n拆除所有平台之后[img=item/space-platform-foundation]\n可以解锁[img=technology/mining-productivity-3][img=technology/steel-plate-productivity][img=technology/plastic-bar-productivity][img=technology/low-density-structure-productivity][img=technology/rocket-fuel-productivity][img=technology/processing-unit-productivity][img=technology/rocket-part-productivity][img=technology/research-productivity]\n\n[color=yellow][font=default-large-bold]跃迁[/font][/color]之前，在平台[img=item/space-platform-foundation]上准备好前往下个星球的物资\n\n\n每个世界流程\n1. 充分利用飞船进行建设(如果有)\n2. 拆除所有飞船，解锁无限科技\n3. 建造新的飞船，准备下个世界\n4. 研究无限科技，前往下个世界\n5. [color=yellow][font=default-large-bold]永久科技[/font][/color] 包括[img=technology/mining-productivity-3][img=technology/steel-plate-productivity][img=technology/plastic-bar-productivity][img=technology/low-density-structure-productivity][img=technology/rocket-fuel-productivity][img=technology/processing-unit-productivity][img=technology/rocket-part-productivity][img=technology/research-productivity]\n\n\n飞船上应该携带什么帮助下次开荒？\n\n版本号20251119\n[img=entity/big-wriggler-pentapod]BUG反馈 Q群 293280221\n\n__1__

