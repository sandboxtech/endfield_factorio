tutorial=[img=virtual-signal/signal-info] [font=default-large-bold]How to play[/font]\n\n[img=item/exoskeleton-equipment] You get stronger as you play:\ncraft → faster crafting\nwalk → faster movement\nmine → faster mining\ndie → more health\n\n[img=virtual-signal/signal-science-pack] Science-pack exp (adds up permanently, sets your starting items every future round):\nEach full stack carried through a warp gives [quality=normal]×1 [quality=uncommon]×2 [quality=rare]×3 [quality=epic]×4 [quality=legendary]×5\n\n[img=item/coin] Coins:\n+1 per minute online, more total playtime means more coins each round\nspend them at the home-planet market for equipment\n\n[img=virtual-signal/signal-clock] Warp timer:\nstarts at 1 hour, +1 hour per new science pack unlocked, -1 min per rocket\n\n[img=virtual-signal/signal-info] Commands:\nview exp [color=acid]/inspect[/color] <player>\ntime until warp [color=acid]/countdown[/color]\nwarp-now gain [color=acid]/preview[/color]\nthis guide [color=acid]/tutorial[/color]
