# Tutorial (HUD intro kept short; full details here)
tutorial-help=Show the gameplay guide
# Tutorial params: __1__ warp timer start minutes (warp_initial_minutes), __2__ platform lifetime (platform_lifetime)
tutorial=[img=virtual-signal/signal-info] [font=default-large-bold]How to play[/font]\n\n[img=item/exoskeleton-equipment] [font=default-large-bold]Get stronger as you play[/font]\ncraft → faster crafting\nwalk → faster movement\nmine → faster mining\ndie → higher max health\n\n[img=virtual-signal/signal-science-pack] [font=default-large-bold]Science-pack exp[/font] (adds up permanently, sets your starting items every future round):\neach full stack carried through a warp becomes exp\nhigher quality is worth more\nthe more you carry, the richer your future starts\n\n[img=item/coin] [font=default-large-bold]Coins[/font]\n+1 per minute online, more total playtime means more coins each round\nspend them at any planet's spawn market for equipment\n\n[img=virtual-signal/signal-clock] [font=default-large-bold]Warp timer[/font]\nstarts at __1__ min\neach new science pack unlocked adds time\n-1 min per rocket launched\n\n[img=space-location/solar-system-edge] Every warp is a new world\n\n[img=virtual-signal/signal-heart] [font=default-large-bold]Space platforms[/font]\neach warp shows the platform's remaining lives before its name [item=parameter-3][virtual-signal=signal-heart] — starts at __2__, -1 per warp, destroyed at 0\n\n[img=virtual-signal/signal-info] [font=default-large-bold]Commands[/font] (type in console):\nview exp [color=acid]/inspect[/color] <player>\nwarp-now gain [color=acid]/preview[/color]\nlast world's exp ranking [color=acid]/lastrank[/color]\nvote to warp [color=acid]/warp[/color]　vote against [color=acid]/tingliu[/color]\nstuck? suicide [color=acid]/suicide[/color]\nthis guide [color=acid]/tutorial[/color]\ntravel [color=acid]/nauvis /vulcanus /gleba /fulgora /aquilo[/color] (cursor/inventory/trash/ammo must be empty)
# Membership commands: appended for members/admins in show_tutorial (regular players don't see them); pure-admin commands are not listed in the tutorial
tutorial-member=[img=virtual-signal/signal-info] [font=default-large-bold]Membership[/font]\ngrant [color=acid]/member[/color] <player>　revoke [color=acid]/unmember[/color] <player>\nkick non-member [color=acid]/kickout[/color] <player>
