# 教程（左上角说明从简，详细玩法在此）
tutorial-help=查看游戏玩法教程
tutorial=[img=virtual-signal/signal-info] [font=default-large-bold]游戏教程[/font]\n\n[img=item/exoskeleton-equipment] 边玩边练，越用越强：\n手搓 → 制造更快\n走路 → 移动更快\n采矿 → 挖得更快\n死亡 → 血量更多\n\n[img=virtual-signal/signal-science-pack] 科技瓶经验（永久累积，决定以后每局开局物资）：\n跃迁前背包里每一组瓶子会变成经验\n每组品质瓶子有额外经验\n\n[img=item/coin] 金币：\n每在线 1 分钟 获得 1 金币\n挂机总时长越长，开局初始金币越多\n去母星出生点的市场买装备零件\n\n[img=virtual-signal/signal-clock] 跃迁倒计时：\n起步 30 分钟，每解锁一种新科技瓶 +1 小时，每发射一枚火箭 -1 分钟\n\n[img=space-location/solar-system-edge] 每次跃迁都是新世界：\n矿物多寡、昼夜、当地时间、地图大小、天色都会随机变，自己探索发现\n\n[img=virtual-signal/signal-info] 常用指令：\n看经验 [color=acid]/chakan[/color] <玩家>\n看倒计时 [color=acid]/daojishi[/color]\n看立即跃迁收益 [color=acid]/yulan[/color]\n卡死自救 [color=acid]/zisha[/color]\n看教程 [color=acid]/jiaocheng[/color]
