
description=[space-age][color=acid]《异星工厂[font=infinite]无尽跃迁[/font]》[/color]\n\n老家塔卫二，没了。\n我们每隔一阵就必须[color=yellow][space-age]跃迁[/color][img=space-location/solar-system-edge]逃离到新星系。\n\n每次跃迁，整个旧星系将被[color=red]抛弃[/color]。\n你的工厂、科技、矿物，全部被留在旧星系。\n\n能带走的，只有背包里的科技[color=acid]瓶子[/color][img=virtual-signal/signal-science-pack]，以及你的飞船。\n[color=yellow][space-age]跃迁[/color]时瓶子化作[color=acid]经验[/color]，让你的[color=acid]职业[/color]更强，往后开局拿到的东西更多。\n飞船会一直跟着你，能用上好几轮。\n\n顶部的[color=acid]倒计时[/color]显示离下次跃迁还有多久。\n不用赶，慢慢攒瓶子、慢慢探索，想怎么玩都行。\n\n点顶左上角 [img=virtual-signal/signal-info]按钮 查看详细玩法\n\n版本号 20260530\n[img=entity/big-wriggler-pentapod] BUG 反馈 Q 群 293280221\n\n__1__\n\n项目地址\nhttps://github.com/sandboxtech/endfield_factorio
