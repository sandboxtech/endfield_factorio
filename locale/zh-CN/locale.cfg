# 教程参数：__1__ 跃迁起步分钟(warp_initial_minutes)，__2__ 飞船寿命(platform_lifetime)
tutorial=[img=virtual-signal/signal-info] [font=default-large-bold]游戏教程[/font]\n\n[img=item/exoskeleton-equipment] [font=default-large-bold]边玩边练，越用越强[/font]\n手搓 → 手搓更快\n走路 → 移动更快\n采矿 → 挖得更快\n死亡 → 生命上限更高\n\n[img=virtual-signal/signal-science-pack] [font=default-large-bold]科技瓶经验[/font]（永久累积，决定以后每局开局物资）：\n跃迁前背包里每一组瓶子会变成经验\n品质越高经验越多\n经验越多每局开局越富\n\n[img=item/coin] [font=default-large-bold]金币[/font]\n每在线 1 分钟获得 1 金币，挂机总时长越长开局金币越多\n去任意星球出生点的市场买装备零件\n\n[img=virtual-signal/signal-clock] [font=default-large-bold]跃迁倒计时[/font]\n起步 __1__ 分钟\n每解锁一种新科技瓶延长一段时间\n每发射一枚火箭 -1 分钟\n\n[img=space-location/solar-system-edge] 每次跃迁都是新世界\n\n[img=virtual-signal/signal-heart] [font=default-large-bold]飞船（太空平台）[/font]\n每次跃迁，船名前会显示剩余命数 [item=parameter-3][virtual-signal=signal-heart]，初始 __2__ 命、每跃迁一次减1命，归零后自动摧毁\n\n[img=virtual-signal/signal-info] 中文指令都可以用对应拼音输入：/查看=/chakan　/预览=/yulan\n\n[img=virtual-signal/signal-info] [font=default-large-bold]可用指令[/font]（在控制台输入）：\n看经验 [color=acid]/查看[/color] <玩家>\n看立即跃迁收益 [color=acid]/预览[/color]\n看上个世界获取经验 [color=acid]/排行[/color]\n投票同意跃迁 [color=acid]/跃迁[/color]　投票反对 [color=acid]/停留[/color]\n卡死自救 [color=acid]/自杀[/color]\n看教程 [color=acid]/教程[/color]\n前往星球 [color=acid]/nauvis /vulcanus /gleba /fulgora /aquilo[/color]
