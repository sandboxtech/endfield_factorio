
description=[space-age][color=acid]《异星工厂[font=infinite]终末地旅行[/font]》[/color]\n\n塔卫二没了。族人散在各个星系里，每隔一阵子就要[color=yellow]跃迁[/color][img=space-location/solar-system-edge]去新的星系，从头来过。你也是其中之一。\n\n每次跃迁，整个星系会被[color=red]抹掉重置[/color]，你建的工厂、研究的科技、所有的矿，全部归零。\n\n好消息是，跃迁的那一刻，你[color=acid]背包里[/color]的科技瓶[img=virtual-signal/signal-science-pack]会被换算成永久角色能力，攒越多角色越强。\n\n[img=virtual-signal/signal-clock] 跃迁倒计时默认 1 小时\n[img=virtual-signal/signal-science-pack] 每研究一项新的科技瓶相关科技可以再延长 1 小时。\n\n[img=virtual-signal/signal-info] 常用指令：\n[color=acid]/chakan[/color] <玩家> 看经验\n[color=acid]/life[/color] 看跃迁倒计时\n\n版本号 20260521  ·  [img=entity/big-wriggler-pentapod] BUG 反馈 Q 群 293280221\n\n__1__\n\n项目地址\nhttps://github.com/sandboxtech/endfield_factorio
