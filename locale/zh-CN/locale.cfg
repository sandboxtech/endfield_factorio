# ══ 会员系统 ══
# 会员系统：/member 授予(管理员/会员) · /unmember 撤销(仅管理员,可撤任何会员) · /kickout 踢非会员(会员/管理员)；管理员永远算会员
not-member=只有会员能用此命令
member-help=授予会员资格，管理员或会员可用。用法 /member <玩家名>
unmember-help=撤销会员资格，仅管理员可用。用法 /unmember <玩家名>
kickout-help=踢出一名非会员，会员或管理员可用。用法 /kickout <玩家名>
member-no-such=没有叫 [color=acid]__1__[/color] 的玩家
member-already=[color=acid]__1__[/color] 已经是会员了
member-not=[color=acid]__1__[/color] 不是会员
member-granted=[img=entity/character] [color=acid]__1__[/color] 已获得会员资格
member-revoked=[img=entity/character] [color=acid]__1__[/color] 的会员资格已解除
member-kicked=[color=acid]__1__[/color] 已被会员 [color=yellow]__2__[/color] 踢出
kickout-self=不能踢自己
kickout-protected=[color=acid]__1__[/color] 是会员/管理员，不能踢
kickout-offline=[color=acid]__1__[/color] 不在线

# ══ 职业系统 ══
# 职业窗口标题（HUD 独立按钮打开）
class-title=[img=virtual-signal/signal-mining] 选择职业
# 职业窗口顶部说明（只讲职业，别提别的系统）
class-help=选一个[color=acid]职业[/color]，它决定你的[color=acid]职业初始物品[/color]\n开局先白送[color=acid]无条件初始物品[/color]\n跃迁前多带它用到的[color=acid]瓶子[/color]，这些瓶子练得越高，开局送的[color=acid]额外初始物品[/color]就越多\n同时只能选一个，随时能换，[color=yellow]下次跃迁生效[/color]：[img=virtual-signal/signal-mining] 绿名 = 当前职业；[img=virtual-signal/signal-check] 蓝名 = 已预约下轮换上；[img=virtual-signal/signal-deny] 红名 = 即将被换走
# 职业窗口里的职业按钮：__1__ = 职业名（class-name-*），__2__ = 该职业招牌物品图标
class-pick=__2__ __1__
# 选定后提示（仅本人）：__1__ = 职业名
# 切换职业全服公告：__1__ 玩家名，__2__ 职业名
class-changed=[color=acid]__1__[/color] 想换成职业 [color=acid]__2__[/color]（下次跃迁生效）
travel-fail-closed=本轮无法前往 __1__（开放概率 __2__%）
travel-no-char=你现在没有角色，无法前往星球
travel-not-generated=星球 __1__ 还没生成
travel-clear-first=前往星球前，请先清空：鼠标、背包、物流(回收)、弹药 这四个区
roboport-limit=[color=red][机器人网络][/color] 单个机器人网络的 roboport 已超过上限 __1__ 个，新放置的已被摧毁并退还。
# 悬停说明(拼接,每行 \n 换行)：白送行 class-tip-head（__1__ 总个数，__2__ 物品图标）；奖励行 class-tip-reward
#   （__1__ 瓶图标=等级来源，__2__ 每几级，__3__ 每批几个，__4__ 物品图标，__5__ 满级最多几个；__2__:__3__ = 满级线:满级总数 的最简比）
class-tip-head=\n白送 [color=acid]__1__[/color] 个 __2__
class-tip-reward=\n__1__ 每 [color=acid]__2__[/color] 级得 [color=acid]__3__[/color] 个 __4__ [color=acid]__5__ / __6__[/color] 个
class-tip-tech=\n[color=acid]开局解锁科技[/color]
class-tip-tech-chance= [color=yellow]（__1__% 概率）[/color]
class-tip-item-p= [color=yellow]（每件 __1__% 概率）[/color]
# 概率科技/配方掷点结果（发给该职业在线玩家）：__1__ 图标，__2__ 本地化名
class-roll-hit=[img=virtual-signal/signal-check] 本轮已解锁 __1__ [color=acid]__2__[/color]
class-roll-hit-levels=[img=virtual-signal/signal-check] 本轮已解锁 __1__ [color=acid]__2__[/color]（+__3__ 级）
class-roll-miss=[img=virtual-signal/signal-deny] 本轮未解锁 __1__ [color=red]__2__[/color]（下轮重掷）
class-tip-recipe=\n[color=acid]开局配方[/color]
# 解锁条件行（需全部满足）：__1__ 需求瓶图标，__2__ 需求等级，__3__ 当前等级
class-tip-unlock=\n[color=red]解锁需[/color] __1__ [color=acid]__2__[/color] 级 当前 __3__
# 点到未解锁职业时的提示：__1__ = 职业名
class-locked-msg=[color=red]__1__[/color] 还没解锁，瓶子等级不够
