# 游戏玩法详介参数：__1__ 跃迁起步分钟(warp_initial_minutes)，__2__ 飞船寿命(platform_lifetime)
guide-gameplay=[img=item/exoskeleton-equipment] [font=default-large-bold]边玩边练，越用越强[/font]\n手搓 → 手搓更快\n走路 → 移动更快\n采矿 → 挖得更快\n\n[img=virtual-signal/signal-science-pack] [font=default-large-bold]科技瓶经验[/font]（永久累积，决定以后每局开局物资）：\n跃迁前背包里每一组瓶子会变成经验\n品质越高经验越多\n经验越多每局开局越富\n\n[img=item/coin] [font=default-large-bold]金币[/font]\n每在线 1 分钟获得 1 金币，挂机总时长越长开局金币越多\n去任意星球出生点的市场买装备零件\n\n[img=virtual-signal/signal-clock] [font=default-large-bold]跃迁倒计时[/font]\n起步 __1__ 分钟\n每解锁一种新科技瓶 延长一段时间\n每发射一枚火箭 减 1 分钟\n\n[img=virtual-signal/signal-heart] [font=default-large-bold]飞船（太空平台）[/font]寿命\n每次跃迁之后，飞船名字前缀 会显示剩余命数\n如 [item=parameter-3][virtual-signal=signal-heart] 代表飞船还有3条命\n 飞船初始有 __2__ 命、每跃迁一次减 1 命\n命归零后飞船爆炸\n
# 按钮指令详介：有按钮的功能改提示"按按钮"，只列【无按钮】的控制台指令
