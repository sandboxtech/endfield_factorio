
description=[space-age][color=acid]《异星工厂[font=infinite]终末地旅行[/font]》[/color]\n\n塔卫二，没了。\n我们每隔一阵就必须[color=yellow]跃迁[/color][img=space-location/solar-system-edge]逃离到新星系。\n\n每次跃迁，整个旧星系将被[color=red]抛弃[/color]。\n你的工厂、科技、矿物，全部被留在旧星系。\n\n能带走的只有[color=acid]背包里的科技瓶[/color][img=virtual-signal/signal-science-pack]。\n它们会变成经验值，让你[color=acid]以后每一局的开局物资[/color]越来越多。\n所以跃迁前尽量往背包里多塞瓶子。\n\n[img=virtual-signal/signal-info] 输入 [color=acid]/jiaocheng[/color] 查看完整玩法教程\n\n版本号 20260521  ·  [img=entity/big-wriggler-pentapod] BUG 反馈 Q 群 293280221\n\n__1__\n\n项目地址\nhttps://github.com/sandboxtech/endfield_factorio
