guide-gameplay=[font=default-large-bold]异星工厂 终末地旅行[/font]\n老家没了，你要不停[color=yellow]跃迁[/color]逃往一个又一个新星系\n每到一处从零重建工厂，时间一到又被迫跃迁\n大家比的是 谁在有限时间里攒得更多、走得更远\n\n[img=virtual-signal/signal-science-pack] [font=default-large-bold]科技瓶[/font]\n跃迁会清空你的工厂和科技，只有背包里的科技瓶能带走\n每个瓶子变成 1 点经验，永久保留，品质越高越多\n瓶子攒得越多，能选的职业越强、开局拿到的东西越多\n\n[img=item/power-armor-mk2] [font=default-large-bold]职业[/font]\n点顶部按钮选一个职业，它决定你每次开局白拿哪些东西\n多练这个职业擅长的科技瓶，开局还会多拿对应物资\n\n[img=item/coin] [font=default-large-bold]金币[/font]\n每次开局发一笔，挂得越久发得越多\n拿去各星球出生点的市场买装备\n\n[img=virtual-signal/signal-clock] [font=default-large-bold]跃迁倒计时[/font]\n起步 __1__ 分钟，时间一到就跃迁去新世界\n研究新科技瓶会延长，发射火箭会缩短\n\n[img=virtual-signal/signal-heart] [font=default-large-bold]飞船[/font]\n船名前缀显示还剩几条命，初始 __2__ 命\n每跃迁一次少 1 命，归零就爆炸\n

