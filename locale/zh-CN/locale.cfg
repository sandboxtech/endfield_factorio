
description=\n[color=acid]《异星工厂[font=infinite]无尽跃迁[/font]》[/color]\n\n[space-age] [font=default-large-bold]剧情[/font]\n我们共同的老家，塔卫二，毁灭了。\n如果[color=acid]倒计时[/color]结束，我们就必须[color=yellow]跃迁[/color]逃离到新星系。\n\n[img=virtual-signal/signal-clock] [font=default-large-bold]倒计时[/font]\n顶部[color=acid]倒计时[/color]结束就[color=yellow]跃迁[/color]去新世界，初始只有 __1__ 分钟。\n研究[color=yellow]瓶子科技[/color]，[color=acid]倒计时[/color]会延长。\n\n[img=space-location/solar-system-edge] [font=default-large-bold]跃迁[/font]\n每次[color=yellow]跃迁[/color]，整个旧星系将被[color=red]抛弃[/color]。\n你的工厂、科技、矿物、材料，全部被留在旧星系。\n只有[color=acid]经验[/color]和[color=acid]飞船[/color]能陪你一同探索新星系。\n\n[img=virtual-signal/signal-science-pack] [font=default-large-bold]经验[/font]\n[color=yellow]跃迁[/color]瞬间，背包里的[color=acid]瓶子[/color]，会变成[color=acid]经验[/color]。\n[color=acid]经验[/color]有12种，专属于你一人，永远不会失去。\n每1个普通[color=acid]瓶子[/color]，变成1点[color=acid]经验[/color]。\n[color=acid]瓶子[/color]品质越高，变成的[color=acid]经验[/color]越多。\n[color=acid]经验[/color]攒得越多，对应[color=acid]等级[/color]越高，开局从[color=acid]职业[/color]拿到的物资就越多。\n\n[img=virtual-signal/signal-mining][font=default-large-bold]职业[/font]\n点顶部按钮选一个[color=acid]职业[/color]，它决定你的[color=acid]职业初始物品[/color]。\n开局先白送[color=acid]无条件初始物品[/color]。\n跃迁前多带它用到的[color=acid]瓶子[/color]，把对应[color=acid]等级[/color]练上去，开局就送更多[color=acid]额外初始物品[/color]。\n\n[img=virtual-signal/signal-heart] [font=default-large-bold]飞船[/font]\n飞船跟随你跨越星系，船名前缀显示还能随你跃迁几次。\n初始 __2__ 次，[color=yellow][space-age]跃迁[/color]次数用完，飞船报废。\n\n\n版本号 20260604\n[img=entity/big-wriggler-pentapod] BUG 反馈 Q 群 293280221\n项目地址\nhttps://github.com/sandboxtech/endfield_factorio
scenario-name=[color=acid]异星工厂[font=infinite]无尽跃迁[/font][/color]
[wn]

