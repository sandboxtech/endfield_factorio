class-title=[img=entity/character] 选择职业
# 职业窗口顶部说明（只讲职业，别提别的系统）
class-help=选一个[color=acid]职业[/color]，它决定每次开局的初始物品\n每个[color=acid]职业[/color]先白送 1 组招牌物品\n练它需要的[color=acid]瓶子[/color]，开局再按[color=acid]经验[/color]多送物资，越多越好\n同时只能选一个，随时能换，当前职业带 [img=virtual-signal/signal-check]
# 职业窗口里的职业按钮：__1__ = 职业名（class-name-*）
class-pick=[img=entity/character] 选择职业 __1__
class-cur=[img=entity/character] [img=virtual-signal/signal-check] 当前职业 __1__
# 选定后提示（仅本人）：__1__ = 职业名
class-set=已选择职业 [color=acid]__1__[/color]\n下次开局起多拿它擅长的物资
# 按钮悬停说明（拼接）：首行 class-tip-head（__1__ 前者图标）；每条后者一行 class-tip-reward
#   （__1__ 哪种瓶图标=等级来源，__2__ 每几级，__3__ 送几个，__4__ 后者物品图标；__2__:__3__ 为最简比）
class-tip-head=开局白送 1 组 __1__
class-tip-reward=\n练 __1__ 每 __2__ 级多送 __3__ 个 __4__
# 解锁条件行（需全部满足）：__1__ 需求瓶图标，__2__ 需求等级，__3__ 当前等级
class-tip-unlock=\n[color=red]解锁需[/color] __1__ [color=acid]__2__[/color] 级 当前 __3__
# 点到未解锁职业时的提示：__1__ = 职业名
class-locked-msg=[color=red]__1__[/color] 还没解锁，科技瓶等级不够
