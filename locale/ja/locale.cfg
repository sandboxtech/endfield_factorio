# ══ 会員システム ══
# 会員システム：/member 付与(管理者/会員) · /unmember 取消(管理者のみ,任意の会員を取消可) · /kickout 非会員を追放(会員/管理者)；管理者は常に会員扱い
not-member=このコマンドは会員のみ使用できます
member-help=会員資格を付与、管理者または会員が使用可。使い方 /member <プレイヤー名>
unmember-help=会員資格を取消、管理者のみ使用可。使い方 /unmember <プレイヤー名>
kickout-help=非会員を1名追放、会員または管理者が使用可。使い方 /kickout <プレイヤー名>
member-no-such=[color=acid]__1__[/color] という名前のプレイヤーはいません
member-already=[color=acid]__1__[/color] はすでに会員です
member-not=[color=acid]__1__[/color] は会員ではありません
member-granted=[img=entity/character] [color=acid]__1__[/color] が会員資格を取得しました
member-revoked=[img=entity/character] [color=acid]__1__[/color] の会員資格が解除されました
member-kicked=[color=acid]__1__[/color] が会員 [color=yellow]__2__[/color] によって追放されました
kickout-self=自分を追放することはできません
kickout-protected=[color=acid]__1__[/color] は会員/管理者なので、追放できません
kickout-offline=[color=acid]__1__[/color] はオンラインではありません

# ══ 職業システム ══
# 職業ウィンドウのタイトル（HUD 独立ボタンで開く）
class-title=[img=virtual-signal/signal-mining] 職業を選択
# 職業ウィンドウ上部の説明（職業のことだけ説明、他のシステムには触れない）
class-help=[color=acid]職業[/color]を1つ選びます。これがあなたの[color=acid]職業初期アイテム[/color]を決めます\n開始時にまず[color=acid]無条件初期アイテム[/color]が無料で配られます\nワープ前にその職業が使う[color=acid]パック[/color]を多く持ち、これらのパックのレベルが高いほど、開始時に配られる[color=acid]追加初期アイテム[/color]が増えます\n職業は同時に1つだけ、いつでも変更可能（[color=yellow]次のワープで反映[/color]）：[img=virtual-signal/signal-mining] 緑 = 現在の職業；[img=virtual-signal/signal-check] 青 = 次回切替予約；[img=virtual-signal/signal-deny] 赤 = まもなく交代
# 職業ウィンドウ内の職業ボタン：__1__ = 職業名（class-name-*），__2__ = その職業の看板アイテムアイコン
class-pick=__2__ __1__
# 選択後の表示（本人のみ）：__1__ = 職業名
# 職業切替の全サーバー公告：__1__ プレイヤー名，__2__ 職業名
class-changed=[color=acid]__1__[/color] が職業を [color=acid]__2__[/color] に変更します（次のワープで反映）
travel-fail-closed=今回は __1__ へ移動できません（開放確率 __2__%）
travel-no-char=今キャラクターがいないため、惑星へ移動できません
travel-not-generated=惑星 __1__ はまだ生成されていません
travel-clear-first=惑星へ移動する前に、マウス・バックパック・物流(回収)・弾薬 の4つの欄を空にしてください
roboport-limit=[color=red][ロボットネットワーク][/color] 単一ロボットネットワークの ロボットステーション が上限 __1__ 個を超えました、新たに設置されたものは破壊され返還されました。
# ホバー説明(連結、各行 \n で改行)：無料行 class-tip-head（__1__ 総個数，__2__ アイテムアイコン）；報酬行 class-tip-reward
#   （__1__ パックアイコン=レベル元，__2__ 何レベルごと，__3__ 1バッチ何個，__4__ アイテムアイコン，__5__ 満レベルで最大何個；__2__:__3__ = 満レベル線:満レベル総数 の最簡比）
class-tip-head=\n無料 [color=acid]__1__[/color] 個 __2__
class-tip-reward=\n__1__ [color=acid]__2__[/color] レベルごとに [color=acid]__3__[/color] 個 __4__ [color=acid]__5__/__6__[/color] 個
class-tip-tech=\n[color=acid]開始時に解放する技術[/color]
class-tip-tech-chance= [color=yellow]（確率 __1__%）[/color]
class-tip-item-p= [color=yellow]（各 __1__%）[/color]
# 確率技術/レシピの抽選結果（その職業のオンラインプレイヤーに送信）：__1__ アイコン，__2__ ローカライズ名
