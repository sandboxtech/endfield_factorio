
description=\n[color=acid]《Factorio[font=infinite]エンドレスワープ[/font]》[/color]\n\n[space-age] [font=default-large-bold]ストーリー[/font]\n私たちの故郷、Tavis II は滅びました。\n[color=acid]カウントダウン[/color]が終わると、新しい星系へ[color=yellow]ワープ[/color]して逃げなければなりません。\n\n[img=virtual-signal/signal-clock] [font=default-large-bold]カウントダウン[/font]\n上部の[color=acid]カウントダウン[/color]が終わると新世界へ[color=yellow]ワープ[/color]します。最初は __1__ 分だけ。\n[color=yellow]サイエンスパック技術[/color]を研究すると、[color=acid]カウントダウン[/color]が延長されます。\n\n[img=space-location/solar-system-edge] [font=default-large-bold]ワープ[/font]\n[color=yellow]ワープ[/color]するたびに、古い星系すべてが[color=red]捨てられます[/color]。\nあなたの工場、技術、鉱石、素材はすべて置き去りになります。\n新しい星系へ一緒に行けるのは[color=acid]経験値[/color]と[color=acid]宇宙船[/color]だけです\n\n[img=virtual-signal/signal-science-pack] [font=default-large-bold]経験値[/font]\n[color=yellow]ワープ[/color]した瞬間、バックパックの中の[color=acid]パック[/color]が[color=acid]経験値[/color]に変わります。\n[color=acid]経験値[/color]は12種類あり、あなた専用で、決して失われません。\n普通の[color=acid]パック[/color]1個につき1ポイントの[color=acid]経験値[/color]になります。\n[color=acid]パック[/color]の品質が高いほど、得られる[color=acid]経験値[/color]も多くなります。\n[color=acid]経験値[/color]を貯めるほど対応する[color=acid]レベル[/color]が上がり、開始時に[color=acid]職業[/color]から受け取る物資が増えます。\n\n[img=virtual-signal/signal-mining][font=default-large-bold]職業[/font]\n上部のボタンで[color=acid]職業[/color]を1つ選びます。これがあなたの[color=acid]職業初期アイテム[/color]を決めます。\n開始時にまず[color=acid]無条件初期アイテム[/color]が無料で配られます。\nワープ前にその職業が使う[color=acid]パック[/color]を多く持ち、対応する[color=acid]レベル[/color]を上げておくと、開始時により多くの[color=acid]追加初期アイテム[/color]がもらえます。\n\n[img=virtual-signal/signal-heart] [font=default-large-bold]宇宙船[/font]\n宇宙船は星系を越えてあなたに付き従い、船名の接頭辞であと何回ワープできるか分かります。\n最初は __2__ 回、[color=yellow][space-age]ワープ[/color]回数を使い切ると、宇宙船は廃棄されます\n\n\nバージョン番号 20260604\n[img=entity/big-wriggler-pentapod] BUG 報告 QQ グループ 293280221\nプロジェクトアドレス\nhttps://github.com/sandboxtech/endfield_factorio
scenario-name=[color=acid]Factorio[font=infinite]エンドレスワープ[/font][/color]
[wn]

