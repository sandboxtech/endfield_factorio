
description=\n[color=acid]Factorio [font=infinite]Salto Infinito[/font][/color]\n\n[space-age] [font=default-large-bold]História[/font]\nTavis II, nosso lar comum, foi destruído.\nQuando a [color=acid]contagem regressiva[/color] terminar, precisamos [color=yellow]saltar[/color] para um novo sistema.\n\n[img=virtual-signal/signal-clock] [font=default-large-bold]Contagem regressiva[/font]\nQuando a [color=acid]contagem regressiva[/color] no topo terminar, você [color=yellow]salta[/color] para um novo mundo, só __1__ min no início.\nPesquise [color=yellow]tecnologias de frascos de ciência[/color] e a [color=acid]contagem regressiva[/color] aumenta.\n\n[img=space-location/solar-system-edge] [font=default-large-bold]Salto[/font]\nCada [color=yellow]salto[/color] [color=red]abandona[/color] todo o sistema antigo.\nSuas fábricas, pesquisas, minérios e materiais ficam todos para trás.\nApenas a [color=acid]experiência[/color] e sua [color=acid]nave[/color] vêm com você para o novo sistema\n\n[img=virtual-signal/signal-science-pack] [font=default-large-bold]Experiência[/font]\nNo instante em que você [color=yellow]salta[/color], os [color=acid]frascos[/color] na sua mochila viram [color=acid]experiência[/color].\nExistem 12 tipos de [color=acid]experiência[/color], só sua, nunca perdida.\nCada [color=acid]frasco[/color] comum vira 1 ponto de [color=acid]experiência[/color].\nQuanto maior a qualidade do [color=acid]frasco[/color], mais [color=acid]experiência[/color] ele vira.\nQuanto mais [color=acid]experiência[/color] acumulada, maior o [color=acid]nível[/color] correspondente, e mais recursos você recebe da [color=acid]profissão[/color] no início.\n\n[img=virtual-signal/signal-mining][font=default-large-bold]Profissão[/font]\nClique no botão do topo para escolher uma [color=acid]profissão[/color], ela define seus [color=acid]itens iniciais da profissão[/color].\nNo início você ganha de graça os [color=acid]itens iniciais incondicionais[/color].\nLeve mais dos [color=acid]frascos[/color] que ela usa antes do salto, suba o [color=acid]nível[/color] correspondente, e ganhe ainda mais [color=acid]itens iniciais extras[/color] no início.\n\n[img=virtual-signal/signal-heart] [font=default-large-bold]Nave[/font]\nA nave segue você através dos sistemas, o prefixo do nome mostra quantos saltos ainda restam.\n__2__ no início, [color=yellow][space-age]quando os saltos[/color] acabam, a nave é sucateada\n\n\nVersão 20260604\n[img=entity/big-wriggler-pentapod] Reporte BUGs no grupo Q 293280221\nEndereço do projeto\nhttps://github.com/sandboxtech/endfield_factorio
scenario-name=[color=acid]Factorio [font=infinite]Salto Infinito[/font][/color]
[wn]

