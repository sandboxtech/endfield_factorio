class-title=[img=virtual-signal/signal-mining] Escolher profissão
# Explicação no topo da janela de profissões (fala só da profissão, não menciona outros sistemas)
class-help=Escolha uma [color=acid]profissão[/color], ela define seus [color=acid]itens iniciais da profissão[/color]\nNo início você ganha de graça os [color=acid]itens iniciais incondicionais[/color]\nLeve mais dos [color=acid]frascos[/color] que ela usa antes do salto, quanto mais alto o nível desses frascos, mais [color=acid]itens iniciais extras[/color] você ganha no início\nApenas uma profissão por vez; troque quando quiser, vale a partir do [color=yellow]próximo salto[/color]: [img=virtual-signal/signal-mining] verde = profissão atual; [img=virtual-signal/signal-check] azul = reservada para o próximo salto; [img=virtual-signal/signal-deny] vermelho = prestes a ser trocada
# Botões de profissão na janela: __1__ = nome da profissão (class-name-*), __2__ = ícone do item característico dessa profissão
class-pick=__2__ __1__
# Aviso após selecionar (só para si): __1__ = nome da profissão
# Anúncio para todo o servidor ao trocar de profissão: __1__ nome do jogador, __2__ nome da profissão
class-changed=[color=acid]__1__[/color] quer mudar para a profissão [color=acid]__2__[/color]
travel-fail-closed=Não dá para ir a __1__ nesta rodada (chance de abertura __2__%)
travel-no-char=Você não tem personagem agora, não dá para ir a um planeta
travel-not-generated=O planeta __1__ ainda não foi gerado
travel-clear-first=Antes de ir a um planeta, esvazie primeiro: mouse, mochila, logística (lixo), munição, estas quatro áreas
roboport-limit=[color=red][Rede de robôs][/color] uma única rede de robôs passou do limite de __1__ roboports, o recém-colocado foi destruído e reembolsado.
# Explicação ao passar o mouse (concatenada, cada linha quebra com \n): linha de doação class-tip-head (__1__ quantidade total, __2__ ícone do item); linha de recompensa class-tip-reward
#   (__1__ ícone do frasco=fonte do nível, __2__ a cada quantos níveis, __3__ quantos por lote, __4__ ícone do item, __5__ máximo no nível máximo; __2__:__3__ = nível máximo:total no máximo na razão mais simples)
class-tip-head=\nDe graça [color=acid]__1__[/color] unidades __2__
class-tip-reward=\n__1__ a cada [color=acid]__2__[/color] níveis ganha [color=acid]__3__[/color] unidades __4__ [color=acid]__5__/__6__[/color] unidades
class-tip-tech=\n[color=acid]Desbloqueia no início[/color]
class-tip-tech-chance= [color=yellow](__1__% de chance)[/color]
class-tip-item-p= [color=yellow](__1__% por item)[/color]
# 概率科技/配方掷点结果（发给该职业在线玩家）：__1__ 图标，__2__ 本地化名
class-roll-hit=[img=virtual-signal/signal-check] Desbloqueado neste mundo: __1__ [color=acid]__2__[/color]
class-roll-hit-levels=[img=virtual-signal/signal-check] Desbloqueado neste mundo: __1__ [color=acid]__2__[/color] (+__3__ níveis)
class-roll-miss=[img=virtual-signal/signal-deny] Não desbloqueado neste mundo: __1__ [color=red]__2__[/color] (nova rolagem no próximo salto)
class-tip-recipe=\n[color=acid]Receitas iniciais:[/color]
# Linha de condição de desbloqueio (precisa atender todas): __1__ ícone do frasco exigido, __2__ nível exigido, __3__ nível atual
class-tip-unlock=\n[color=red]Desbloqueio requer[/color] __1__ [color=acid]__2__[/color] nível atual __3__
# Aviso ao clicar numa profissão não desbloqueada: __1__ = nome da profissão
class-locked-msg=[color=red]__1__[/color] ainda não desbloqueada, nível de frasco insuficiente
# Subtítulos das seções da janela de profissões (usado por gui.show_classes; ambiente em inglês passa por aqui, se faltar em chinês faz fallback para def.section em chinês)
